<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đang chuyển trang...</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9241640783850691" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FDFCF8;
    --text: #2D2A26;
    --text-soft: #6B6560;
    --accent: #FF6B6B;
    --accent2: #A78BFA;
    --yellow: #FFD93D;
    --teal: #4ECDC4;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(60px);
    opacity: 0.35;
    animation: blobFloat 6s ease-in-out infinite;
  }
  .blob-1 { width: 300px; height: 300px; background: #FFD93D; top: -80px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 250px; height: 250px; background: #4ECDC4; bottom: -60px; right: -60px; animation-delay: 2s; }
  .blob-3 { width: 180px; height: 180px; background: #A78BFA; top: 40%; left: -40px; animation-delay: 4s; }
  .blob-4 { width: 160px; height: 160px; background: #FF6B6B; top: 20%; right: -30px; animation-delay: 1s; }

  @keyframes blobFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  /* Stars floating */
  .stars {
    position: fixed;
    width: 100%; height: 100%;
    top: 0; left: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    font-size: 1.2rem;
    animation: starFloat linear infinite;
    opacity: 0;
  }

  @keyframes starFloat {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  /* Character animation */
  .character {
    font-size: 4.5rem;
    animation: charBounce 0.8s ease infinite alternate;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.12));
    line-height: 1;
  }

  @keyframes charBounce {
    from { transform: translateY(0) rotate(-5deg) scale(1); }
    to   { transform: translateY(-12px) rotate(5deg) scale(1.05); }
  }

  /* Message */
  .message {
    text-align: center;
  }
  .message h2 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .message h2 .highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .message p {
    margin-top: 0.4rem;
    font-size: 0.92rem;
    color: var(--text-soft);
    font-weight: 600;
  }

  /* Countdown ring */
  .countdown-wrap {
    position: relative;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .countdown-svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }

  .countdown-bg {
    fill: none;
    stroke: #EEE;
    stroke-width: 6;
  }

  .countdown-ring {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 251.2;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }

  .countdown-number {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    position: relative;
    z-index: 1;
    transition: transform 0.2s ease;
  }
  .countdown-number.pulse {
    animation: numPulse 0.3s ease;
  }
  @keyframes numPulse {
    0%   { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .countdown-label {
    font-size: 0.75rem;
    color: var(--text-soft);
    font-weight: 700;
    text-align: center;
    margin-top: -4px;
  }

  /* Ad box */
  .ad-box {
    width: 100%;
    background: white;
    border-radius: 20px;
    border: 2.5px solid #F0EDE8;
    padding: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .ad-label {
    font-size: 0.68rem;
    color: #BBB;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    align-self: flex-start;
  }

  .ad-box ins {
    display: block;
    width: 100%;
  }

  /* Skip button */
  .skip-btn {
    display: none;
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255, 107, 107, 0.35);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    animation: fadeIn 0.4s ease both;
  }
  .skip-btn:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 8px 24px rgba(255, 107, 107, 0.4);
  }
  .skip-btn:active {
    transform: scale(0.97);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Destination badge */
  .destination {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.04);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-soft);
  }
  .destination .dest-icon { font-size: 1.1rem; }

  /* Page enter animation */
  .card { animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.85) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<!-- Floating stars -->
<div class="stars" id="stars"></div>

<div class="card">

  <div class="character" id="character">🚀</div>

  <div class="message">
    <h2>Sắp đến nơi rồi! <span class="highlight">✨</span></h2>
    <p id="destText">Đang chuẩn bị bài học cho bé...</p>
  </div>

  <!-- Countdown ring -->
  <div class="countdown-wrap">
    <svg class="countdown-svg" width="90" height="90" viewBox="0 0 90 90">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FF6B6B"/>
          <stop offset="100%" style="stop-color:#A78BFA"/>
        </linearGradient>
      </defs>
      <circle class="countdown-bg" cx="45" cy="45" r="40"/>
      <circle class="countdown-ring" id="ring" cx="45" cy="45" r="40"/>
    </svg>
    <div class="countdown-number" id="countNum">5</div>
  </div>
  <div class="countdown-label">giây nữa thôi!</div>

  <!-- Ad area -->
  <div class="ad-box">
    <div class="ad-label">Quảng cáo</div>
    <ins class="adsbygoogle"
         style="display:block;width:100%;min-height:90px"
         data-ad-client="ca-pub-9241640783850691"
         data-ad-slot="AUTO"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <!-- Destination badge -->
  <div class="destination">
    <span class="dest-icon" id="destIcon">📚</span>
    <span id="destName">Đang tải...</span>
  </div>

  <!-- Skip button (hiện sau 3 giây) -->
  <button class="skip-btn" id="skipBtn" onclick="goNow()">
    Vào học ngay →
  </button>

</div>

<script>
  // ==========================================
  // Đọc tham số từ URL
  // URL dạng: ads-transition.html?dest=toan/index.html&name=Học+Toán&icon=🔢
  // ==========================================
  const params = new URLSearchParams(window.location.search);
  const dest   = params.get('dest')  || 'index.html';
  const name   = params.get('name')  || 'Bài học';
  const icon   = params.get('icon')  || '📚';

  // Hiển thị thông tin đích đến
  document.getElementById('destIcon').textContent = icon;
  document.getElementById('destName').textContent = name;
  document.getElementById('destText').textContent = `Chuẩn bị vào "${name}" cho bé!`;

  // Emoji nhân vật theo môn
  const characters = {
    'toan': '🔢', 'tieng-anh': '🔤', 'tieng-viet': '📖', 'giai-tri': '🎮'
  };
  const key = Object.keys(characters).find(k => dest.includes(k));
  if (key) document.getElementById('character').textContent = characters[key];

  // ==========================================
  // Load AdSense
  // ==========================================
  (adsbygoogle = window.adsbygoogle || []).push({});

  // ==========================================
  // Floating stars
  // ==========================================
  const starsEl = document.getElementById('stars');
  const emojis = ['⭐','✨','🌟','💫','🎈','🎀','🌈'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
    s.style.animationDuration = (4 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 5) + 's';
    starsEl.appendChild(s);
  }

  // ==========================================
  // Countdown 5 giây
  // ==========================================
  const TOTAL = 5;
  const circumference = 2 * Math.PI * 40; // 251.2
  const ring = document.getElementById('ring');
  const countNum = document.getElementById('countNum');
  const skipBtn = document.getElementById('skipBtn');

  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = 0;

  let remaining = TOTAL;

  function tick() {
    remaining--;

    // Cập nhật số
    countNum.textContent = remaining;
    countNum.classList.remove('pulse');
    void countNum.offsetWidth; // reflow
    countNum.classList.add('pulse');

    // Cập nhật vòng tròn
    const offset = circumference * (1 - remaining / TOTAL);
    ring.style.strokeDashoffset = offset;

    // Hiện nút skip sau 3 giây (còn 2 giây)
    if (remaining <= 2) {
      skipBtn.style.display = 'block';
    }

    if (remaining <= 0) {
      goNow();
    }
  }

  const timer = setInterval(tick, 1000);

  function goNow() {
    clearInterval(timer);
    window.location.href = dest;
  }
</script>

</body>
</html>
