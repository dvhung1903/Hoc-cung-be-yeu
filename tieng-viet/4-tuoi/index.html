<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #1a1a2e;
    --bg2: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --green: #0BDA51;
    --blue: #4FC3F7;
    --card: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.15);
    --white: #ffffff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Animated bg stars */
  .stars {
    position: fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(10,10,40,0.8) 100%);
  }
  .star-particle {
    position: fixed; border-radius:50%; background:white;
    animation: twinkle ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes twinkle {
    0%,100%{opacity:.15;transform:scale(1)}
    50%{opacity:.9;transform:scale(1.5)}
  }

  header {
    position:relative;z-index:10;
    text-align:center; padding: 28px 20px 18px;
  }
  header h1 {
    font-size: 2.2rem; font-weight:900;
    background: linear-gradient(90deg, #f5a623, #e94560, #4FC3F7);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 2px 12px rgba(229,69,96,.4));
    letter-spacing: 1px;
  }
  header p { color:rgba(255,255,255,0.65); font-size:1rem; margin-top:6px; }

  /* Lesson screen */
  #lesson-screen { position:relative;z-index:10; max-width:680px;margin:0 auto;padding:10px 20px 40px; }
  .lesson-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px; margin-top:8px; }
  .lesson-card {
    background:var(--card); border:2px solid var(--card-border); border-radius:20px;
    padding:18px 10px; text-align:center; cursor:pointer;
    transition: transform .2s, border-color .2s, background .2s;
    backdrop-filter: blur(8px);
  }
  .lesson-card:hover {
    transform:translateY(-6px) scale(1.05);
    border-color: var(--gold);
    background: rgba(245,166,35,0.12);
  }
  .lesson-card .icon { font-size:2.6rem; display:block;margin-bottom:8px; }
  .lesson-card .name { font-size:.92rem;font-weight:800;color:rgba(255,255,255,0.9); }

  /* Learn screen */
  #learn-screen { display:none; max-width:560px;margin:0 auto;padding:10px 20px 40px; position:relative;z-index:10; }

  .top-bar { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
  .btn-back {
    background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.2);
    color:white; border-radius:50px; padding:7px 16px;
    font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;
    cursor:pointer;transition:background .2s;
  }
  .btn-back:hover { background:rgba(255,255,255,0.2); }
  .progress-wrap { flex:1; height:12px; background:rgba(255,255,255,0.12); border-radius:10px;overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#f5a623,#e94560); border-radius:10px; transition:width .5s ease; }
  .progress-label { font-size:.9rem;font-weight:800;color:var(--gold);white-space:nowrap; }

  /* Question card */
  .question-box {
    background:var(--card); border:2px solid var(--card-border);
    border-radius:24px; padding:24px 20px 20px; text-align:center;
    backdrop-filter:blur(12px);
    animation: slideIn .4s cubic-bezier(.3,1.3,.5,1);
  }
  @keyframes slideIn {
    from { transform:translateY(30px) scale(0.9); opacity:0; }
    to { transform:translateY(0) scale(1); opacity:1; }
  }
  .question-label { font-size:.9rem;color:rgba(255,255,255,.55);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px; }
  .question-word {
    font-size: 2.8rem; font-weight:900;
    background:linear-gradient(135deg,#fff,#4FC3F7);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom: 8px; letter-spacing:2px;
  }
  .speak-q-btn {
    background:linear-gradient(135deg,#e94560,#f5a623);
    border:none;border-radius:50px;padding:8px 22px;
    font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:white;
    cursor:pointer;transition:transform .15s;margin-bottom:6px;
    box-shadow:0 4px 16px rgba(229,69,96,.35);
  }
  .speak-q-btn:hover { transform:scale(1.07); }

  /* Choices */
  .choices-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:12px; margin-top:16px;
  }
  .choice-btn {
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15);
    border-radius:18px; padding:16px 10px; cursor:pointer;
    transition: transform .2s, border-color .2s, background .2s;
    text-align:center; position:relative; overflow:hidden;
  }
  .choice-btn:hover:not(:disabled) {
    transform:scale(1.04);
    border-color:rgba(255,255,255,0.5);
    background:rgba(255,255,255,0.14);
  }
  .choice-btn .c-emoji { font-size:2.8rem; display:block;margin-bottom:6px; }
  .choice-btn .c-label { font-size:1rem; font-weight:800; color:rgba(255,255,255,0.85); }
  .choice-btn.correct {
    border-color: var(--green); background:rgba(11,218,81,.15);
    animation: correctPop .4s ease;
  }
  .choice-btn.wrong {
    border-color: var(--accent); background:rgba(233,69,96,.15);
    animation: shake .4s ease;
  }
  @keyframes correctPop {
    0%{transform:scale(1)} 40%{transform:scale(1.15)} 100%{transform:scale(1)}
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
  }
  .choice-btn:disabled { cursor:default; }

  .feedback-msg {
    font-size:1.3rem;font-weight:900;text-align:center;margin-top:12px;
    min-height:32px; transition:opacity .3s;
  }
  .feedback-msg.correct { color:var(--green); }
  .feedback-msg.wrong { color:var(--accent); }

  .next-btn {
    display:block;margin:14px auto 0;
    background:linear-gradient(135deg,#4FC3F7,#6C5CE7);
    border:none;border-radius:50px;padding:11px 34px;
    font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;color:white;
    cursor:pointer;box-shadow:0 6px 20px rgba(79,195,247,.3);transition:transform .15s;
    opacity:0;pointer-events:none;
  }
  .next-btn.visible { opacity:1;pointer-events:all;animation:popIn .3s ease; }
  @keyframes popIn { from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1} }
  .next-btn:hover { transform:scale(1.05); }

  /* Score bar */
  .score-row { display:flex;justify-content:center;gap:20px;margin-bottom:14px; }
  .score-badge {
    background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
    border-radius:50px;padding:5px 16px;font-size:.9rem;font-weight:800;
  }
  .score-badge.good { border-color:var(--green);color:var(--green); }
  .score-badge.bad { border-color:var(--accent);color:var(--accent); }

  /* Done */
  #done-screen {
    display:none;text-align:center;max-width:420px;
    margin:0 auto;padding:30px 20px;position:relative;z-index:10;
  }
  .done-box {
    background:var(--card);border:2px solid var(--card-border);
    border-radius:28px;padding:40px 28px;backdrop-filter:blur(12px);
  }
  .done-box .trophy { font-size:4.5rem;animation:float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)} }
  .done-box h2 { font-size:2rem;font-weight:900;color:var(--gold);margin:16px 0 8px; }
  .done-result { font-size:1.3rem;color:var(--green);font-weight:800;margin-bottom:6px; }
  .done-box p { color:rgba(255,255,255,.65);font-size:1rem; }
  .done-actions { display:flex;flex-direction:column;gap:10px;margin-top:22px; }
  .done-actions button {
    border:none;border-radius:50px;padding:12px;
    font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;color:white;cursor:pointer;
    transition:transform .15s;
  }
  .done-actions button:hover { transform:scale(1.04); }
  .btn-replay { background:linear-gradient(135deg,#0BDA51,#00b341); }
  .btn-home { background:linear-gradient(135deg,#f5a623,#e94560); }
</style>
</head>

      {word:'Mướp', emoji:'🌿'},
      {word:'Đậu đỗ', emoji:'🫘'},
      {word:'Rau cải', emoji:'🥬'},
    ]
  },
];

let currentLesson = null;
let queue = [];
let idx = 0;
let score = 0;
let wrong = 0;
let answered = false;
const synth = window.speechSynthesis;

function getVoice() {
  const voices = synth.getVoices();
  return voices.find(v => v.lang.startsWith('vi')) || voices[0];
}
function speakText(text, rate=0.8) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='vi-VN'; u.rate=rate; u.pitch=1.1;
  const v=getVoice(); if(v) u.voice=v;
  synth.speak(u);
}

function renderLessons() {
  const colors = ['#e94560','#f5a623','#0BDA51','#4FC3F7','#A29BFE','#fd79a8','#00cec9'];
  document.getElementById('lessonGrid').innerHTML = lessons.map((l,i) => `
    <div class="lesson-card" onclick="startLesson('${l.id}')" style="border-color:${colors[i%colors.length]}22">
      <span class="icon">${l.icon}</span>
      <div class="name">${l.name}</div>
    </div>
  `).join('');
}

function startLesson(id) {
  currentLesson = lessons.find(l=>l.id===id);
  const shuffled = [...currentLesson.items].sort(()=>Math.random()-.5);
  queue = shuffled.slice(0,8);
  idx=0; score=0; wrong=0; answered=false;
  document.getElementById('lesson-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('learn-screen').style.display='block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const correct = queue[idx];
  // Pick 3 wrong items from lesson pool, not duplicates
  const pool = currentLesson.items.filter(it=>it.word!==correct.word);
  const wrongs = pool.sort(()=>Math.random()-.5).slice(0,3);
  const choices = [correct,...wrongs].sort(()=>Math.random()-.5);

  document.getElementById('qWord').textContent = correct.word.toUpperCase();
  document.getElementById('feedbackMsg').textContent='';
  document.getElementById('feedbackMsg').className='feedback-msg';
  document.getElementById('nextBtn').classList.remove('visible');

  // Progress
  const pct = ((idx+1)/queue.length)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${idx+1}/${queue.length}`;
  document.getElementById('scoreGood').textContent=`✅ ${score}`;
  document.getElementById('scoreBad').textContent=`❌ ${wrong}`;

  // Choices
  document.getElementById('choicesGrid').innerHTML = choices.map(c=>`
    <button class="choice-btn" onclick="checkAnswer(this,'${c.word}','${correct.word}')">
      <span class="c-emoji">${c.emoji}</span>
      <span class="c-label">${c.word}</span>
    </button>
  `).join('');

  // Animate question box
  const box = document.getElementById('questionBox');
  box.style.animation='none';
  void box.offsetWidth;
  box.style.animation='slideIn .4s cubic-bezier(.3,1.3,.5,1)';

  // Auto speak
  setTimeout(()=>speakText(correct.word), 400);
}

function speakQuestion() {
  speakText(queue[idx].word);
}

function checkAnswer(btn, chosen, correct) {
  if(answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>b.disabled=true);
  const fm = document.getElementById('feedbackMsg');
  if(chosen===correct) {
    btn.classList.add('correct');
    fm.textContent='🎉 Đúng rồi! Giỏi lắm!';
    fm.className='feedback-msg correct';
    score++;
    speakText('Đúng rồi! Giỏi lắm!');
  } else {
    btn.classList.add('wrong');
    // highlight correct
    allBtns.forEach(b=>{ if(b.querySelector('.c-label').textContent===correct) b.classList.add('correct'); });
    fm.textContent='❌ Chưa đúng! Thử lại nhé!';
    fm.className='feedback-msg wrong';
    wrong++;
    speakText('Chưa đúng! Thử lại nhé!');
  }
  document.getElementById('scoreGood').textContent=`✅ ${score}`;
  document.getElementById('scoreBad').textContent=`❌ ${wrong}`;
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  idx++;
  if(idx>=queue.length) { showDone(); return; }
  renderQuestion();
}

function showDone() {
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  document.getElementById('doneResult').textContent=`${score}/${queue.length} câu đúng`;
  speakText(`Bé đã trả lời đúng ${score} trên ${queue.length} câu. Giỏi lắm!`);
}

function replay() { startLesson(currentLesson.id); }
function goBack() {
  synth.cancel();
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('lesson-screen').style.display='block';
}

synth.onvoiceschanged=()=>{};
renderLessons();
</script>
</body>
</html>
