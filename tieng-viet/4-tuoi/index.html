<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé học tiếng Việt - 4 tuổi 🦁</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg1:#1a1a2e;--bg2:#16213e;--accent:#e94560;--gold:#f5a623;--green:#0BDA51;--blue:#4FC3F7;--card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.15);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#fff;overflow-x:hidden;}
.star-p{position:fixed;border-radius:50%;background:white;animation:twinkle ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.5)}}
header{position:relative;z-index:10;text-align:center;padding:28px 20px 18px;}
header h1{font-size:2.2rem;font-weight:900;background:linear-gradient(90deg,#f5a623,#e94560,#4FC3F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
header p{color:rgba(255,255,255,.65);font-size:1rem;margin-top:6px;}
#lesson-screen{position:relative;z-index:10;max-width:680px;margin:0 auto;padding:10px 20px 40px;}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;margin-top:8px;}
.lesson-card{background:var(--card);border:2px solid var(--border);border-radius:20px;cursor:pointer;transition:transform .2s,border-color .2s;backdrop-filter:blur(8px);overflow:hidden;}
.lesson-card:hover{transform:translateY(-6px) scale(1.05);border-color:var(--gold);}
.lesson-thumb{width:100%;height:80px;object-fit:cover;background:#222;}
.lesson-card-body{padding:10px 8px 12px;text-align:center;}
.lesson-card .icon{font-size:1.3rem;}
.lesson-card .name{font-size:.85rem;font-weight:800;color:rgba(255,255,255,.9);margin-top:3px;}
#learn-screen{display:none;max-width:560px;margin:0 auto;padding:10px 20px 40px;position:relative;z-index:10;}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.btn-back{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:white;border-radius:50px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;}
.btn-back:hover{background:rgba(255,255,255,.2);}
.prog-wrap{flex:1;height:12px;background:rgba(255,255,255,.12);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#f5a623,#e94560);border-radius:10px;transition:width .5s;}
.prog-label{font-size:.9rem;font-weight:800;color:var(--gold);white-space:nowrap;}
.score-row{display:flex;justify-content:center;gap:20px;margin-bottom:14px;}
.score-badge{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:50px;padding:5px 16px;font-size:.9rem;font-weight:800;}
.score-badge.good{border-color:var(--green);color:var(--green);}
.score-badge.bad{border-color:var(--accent);color:var(--accent);}
.q-box{background:var(--card);border:2px solid var(--border);border-radius:24px;padding:22px 18px 18px;backdrop-filter:blur(12px);animation:slideIn .4s cubic-bezier(.3,1.3,.5,1);}
@keyframes slideIn{from{transform:translateY(30px) scale(0.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.q-label{font-size:.85rem;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.q-word{font-size:2.6rem;font-weight:900;background:linear-gradient(135deg,#fff,#4FC3F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;letter-spacing:2px;}
.speak-q-btn{background:linear-gradient(135deg,#e94560,#f5a623);border:none;border-radius:50px;padding:8px 22px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;color:white;cursor:pointer;transition:.15s;margin-bottom:14px;box-shadow:0 4px 14px rgba(229,69,96,.3);}
.speak-q-btn:hover{transform:scale(1.07);}
/* 4-choice grid with real photos */
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:16px;cursor:pointer;transition:.2s;text-align:center;overflow:hidden;position:relative;}
.choice-btn:hover:not(:disabled){border-color:rgba(255,255,255,.5);transform:scale(1.04);}
.choice-img-wrap{width:100%;height:110px;overflow:hidden;background:#1a1a2e;position:relative;}
.choice-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s;}
.choice-img-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:#1a1a2e;}
.choice-label{padding:8px 4px;font-size:.9rem;font-weight:800;color:rgba(255,255,255,.85);}
.choice-btn.correct{border-color:var(--green);background:rgba(11,218,81,.18);animation:correctBounce .4s;}
.choice-btn.wrong{border-color:var(--accent);background:rgba(233,69,96,.15);animation:wrongShake .4s;}
@keyframes correctBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.choice-btn:disabled{cursor:default;}
.feedback-msg{font-size:1.2rem;font-weight:900;text-align:center;margin-top:12px;min-height:28px;}
.feedback-msg.ok{color:var(--green);}
.feedback-msg.no{color:var(--accent);}
.next-btn{display:block;margin:14px auto 0;background:linear-gradient(135deg,#4FC3F7,#6C5CE7);border:none;border-radius:50px;padding:11px 34px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;color:white;cursor:pointer;box-shadow:0 6px 20px rgba(79,195,247,.3);transition:.15s;opacity:0;pointer-events:none;}
.next-btn.visible{opacity:1;pointer-events:all;animation:popIn .3s;}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.next-btn:hover{transform:scale(1.05);}
#done-screen{display:none;text-align:center;max-width:420px;margin:0 auto;padding:30px 20px;position:relative;z-index:10;}
.done-box{background:var(--card);border:2px solid var(--border);border-radius:28px;padding:40px 28px;backdrop-filter:blur(12px);}
.done-trophy{font-size:4.5rem;animation:float 2s ease-in-out infinite;display:block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.done-box h2{font-size:2rem;font-weight:900;color:var(--gold);margin:16px 0 8px;}
.done-result{font-size:1.3rem;color:var(--green);font-weight:800;margin-bottom:6px;}
.done-box p{color:rgba(255,255,255,.65);font-size:1rem;}
.done-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
.done-actions button{border:none;border-radius:50px;padding:12px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;color:white;cursor:pointer;transition:.15s;}
.done-actions button:hover{transform:scale(1.04);}
.btn-replay{background:linear-gradient(135deg,#0BDA51,#00b341);}
.btn-home{background:linear-gradient(135deg,#f5a623,#e94560);}
</style>

let currentLesson=null,queue=[],idx=0,score=0,wrong=0,answered=false;
const synth=window.speechSynthesis;
function imgUrl(q,sig,w,h){return`https://source.unsplash.com/${w}x${h}/?${encodeURIComponent(q)}&sig=${sig}`;}
function getVoice(){const v=synth.getVoices();return v.find(x=>x.lang.startsWith('vi'))||v[0];}
function speakText(t){
  synth.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=0.82;u.pitch=1.1;
  const vo=getVoice();if(vo)u.voice=vo;synth.speak(u);
}
function renderLessons(){
  const colors=['#e94560','#f5a623','#0BDA51','#4FC3F7','#A29BFE','#fd79a8','#00cec9'];
  document.getElementById('lessonGrid').innerHTML=lessons.map((l,i)=>`
    <div class="lesson-card" onclick="startLesson('${l.id}')" style="border-color:${colors[i%colors.length]}44">
      <img class="lesson-thumb" src="${imgUrl(l.tQ,l.tS,260,80)}" alt="${l.name}" onerror="this.style.background='#333'">
      <div class="lesson-card-body"><span class="icon">${l.icon}</span><div class="name">${l.name}</div></div>
    </div>`).join('');
}
function startLesson(id){
  currentLesson=lessons.find(l=>l.id===id);
  queue=[...currentLesson.items].sort(()=>Math.random()-.5).slice(0,8);
  idx=0;score=0;wrong=0;answered=false;
  document.getElementById('lesson-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('learn-screen').style.display='block';
  renderQ();
}
function makeChoiceHTML(c,correctWord){
  const spinId='sp_'+c.sig;
  const imgId='ci_'+c.sig;
  return `
    <button class="choice-btn" onclick="checkAns(this,'${c.w}','${correctWord}')">
      <div class="choice-img-wrap">
        <div class="choice-img-spinner" id="${spinId}">⏳</div>
        <img class="choice-img" id="${imgId}" src="" alt="${c.w}" style="opacity:0"
          onload="this.style.opacity='1';document.getElementById('${spinId}').style.display='none'"
          onerror="document.getElementById('${spinId}').textContent='🖼️'">
      </div>
      <div class="choice-label">${c.w}</div>
    </button>`;
}
function renderQ(){
  answered=false;
  const correct=queue[idx];
  const pool=currentLesson.items.filter(it=>it.w!==correct.w);
  const wrongs=pool.sort(()=>Math.random()-.5).slice(0,3);
  const choices=[correct,...wrongs].sort(()=>Math.random()-.5);
  document.getElementById('qWord').textContent=correct.w.toUpperCase();
  document.getElementById('feedbackMsg').textContent='';
  document.getElementById('feedbackMsg').className='feedback-msg';
  document.getElementById('nextBtn').classList.remove('visible');
  const pct=((idx+1)/queue.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${idx+1}/${queue.length}`;
  document.getElementById('scoreGood').textContent=`✅ ${score}`;
  document.getElementById('scoreBad').textContent=`❌ ${wrong}`;
  document.getElementById('choicesGrid').innerHTML=choices.map(c=>makeChoiceHTML(c,correct.w)).join('');
  // load images after DOM ready
  choices.forEach(c=>{
    const el=document.getElementById('ci_'+c.sig);
    if(el) el.src=imgUrl(c.q,c.sig,260,110);
  });
  const box=document.getElementById('qBox');
  box.style.animation='none';void box.offsetWidth;box.style.animation='slideIn .4s cubic-bezier(.3,1.3,.5,1)';
  setTimeout(()=>speakText(correct.w),400);
}
function speakQ(){speakText(queue[idx].w);}
function checkAns(btn,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fm=document.getElementById('feedbackMsg');
  if(chosen===correct){
    btn.classList.add('correct');fm.textContent='🎉 Đúng rồi! Giỏi lắm!';fm.className='feedback-msg ok';score++;
    speakText('Đúng rồi! Giỏi lắm!');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.querySelector('.choice-label').textContent===correct)b.classList.add('correct');});
    fm.textContent='❌ Chưa đúng! Thử lại nhé!';fm.className='feedback-msg no';wrong++;
    speakText('Chưa đúng! Thử lại nhé!');
  }
  document.getElementById('scoreGood').textContent=`✅ ${score}`;
  document.getElementById('scoreBad').textContent=`❌ ${wrong}`;
  document.getElementById('nextBtn').classList.add('visible');
}
function nextQ(){idx++;if(idx>=queue.length){showDone();return;}renderQ();}
function showDone(){
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  document.getElementById('doneResult').textContent=`${score}/${queue.length} câu đúng`;
  speakText(`Bé đã trả lời đúng ${score} trên ${queue.length} câu. Giỏi lắm!`);
}
function replay(){startLesson(currentLesson.id);}
function goBack(){synth.cancel();document.getElementById('learn-screen').style.display='none';document.getElementById('done-screen').style.display='none';document.getElementById('lesson-screen').style.display='block';}
synth.onvoiceschanged=()=>{};
renderLessons();
</script>
</body>
</html>
