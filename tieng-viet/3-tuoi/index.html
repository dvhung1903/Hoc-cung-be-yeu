:root{--cream:#FFFDF5;--shadow:0 8px 32px rgba(0,0,0,0.13);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo 2',cursive;background:linear-gradient(170deg,#b8e8ff 0%,#d6f5ff 35%,#ccf5a0 100%);min-height:100vh;overflow-x:hidden;}
.cloud{position:fixed;background:white;border-radius:50px;opacity:.8;pointer-events:none;animation:floatCloud linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:130px;height:44px;top:7%;animation-duration:28s;}
.c1::before{width:65px;height:65px;top:-32px;left:18px;}
.c1::after{width:42px;height:42px;top:-22px;left:62px;}
.c2{width:90px;height:30px;top:22%;animation-duration:38s;animation-delay:-12s;}
.c2::before{width:45px;height:45px;top:-22px;left:12px;}
.c2::after{width:30px;height:30px;top:-14px;left:44px;}
@keyframes floatCloud{from{left:-220px}to{left:110vw}}
header{text-align:center;padding:26px 20px 14px;position:relative;z-index:10;}
header h1{font-size:2.3rem;font-weight:900;color:#fff;text-shadow:0 4px 14px rgba(0,100,180,.25);}
header p{color:#fff;font-size:1rem;margin-top:5px;}
#lesson-screen{max-width:700px;margin:0 auto;padding:14px 18px 40px;position:relative;z-index:10;}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-top:8px;}
.lesson-card{background:var(--cream);border-radius:22px;cursor:pointer;box-shadow:var(--shadow);border:3px solid white;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.lesson-card:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 16px 36px rgba(0,0,0,.16);}
.lesson-thumb{width:100%;height:90px;object-fit:cover;display:block;background:#e0e0e0;}
.lesson-card-body{padding:10px 10px 12px;text-align:center;}
.lesson-card .icon{font-size:1.4rem;}
.lesson-card .name{font-size:.92rem;font-weight:800;color:#444;margin-top:2px;}
#learn-screen{display:none;max-width:480px;margin:0 auto;padding:10px 18px 40px;position:relative;z-index:10;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.btn-back{background:white;border:none;border-radius:50px;padding:8px 18px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:#555;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;}
.btn-back:hover{transform:scale(1.05);}
.prog-wrap{flex:1;margin:0 12px;height:14px;background:rgba(255,255,255,.6);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF9F43);border-radius:10px;transition:width .5s;}
.prog-text{font-size:.95rem;font-weight:800;color:white;}
.card-wrap{background:var(--cream);border-radius:28px;box-shadow:0 14px 40px rgba(0,0,0,.14);border:4px solid white;overflow:hidden;animation:popIn .4s cubic-bezier(.3,1.4,.5,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.card-photo-wrap{position:relative;width:100%;height:260px;background:#ddd;overflow:hidden;}
.card-photo{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s;}
.photo-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:#f5f5f5;transition:opacity .3s;}
.card-body{padding:20px 20px 22px;text-align:center;}
.card-word{font-size:3rem;font-weight:900;color:#333;letter-spacing:2px;margin-bottom:4px;}
.card-sub{font-size:1.05rem;color:#999;font-weight:600;}
.speak-btn{margin-top:18px;background:linear-gradient(135deg,#FF85A1,#FF9F43);border:none;border-radius:50px;padding:13px 36px;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;color:white;cursor:pointer;box-shadow:0 6px 18px rgba(255,133,161,.4);display:flex;align-items:center;gap:8px;margin-left:auto;margin-right:auto;transition:transform .15s;}
.speak-btn:hover{transform:scale(1.07);}
.speak-btn.speaking{animation:pulse .5s ease-in-out infinite alternate;}
@keyframes pulse{to{transform:scale(1.1);}}
.next-btn{margin-top:14px;background:linear-gradient(135deg,#a29bfe,#6c5ce7);border:none;border-radius:50px;padding:12px 34px;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;color:white;cursor:pointer;transition:transform .15s;display:block;margin-left:auto;margin-right:auto;}
.next-btn:hover{transform:scale(1.05);}
#done-screen{display:none;text-align:center;max-width:400px;margin:0 auto;padding:30px 18px;position:relative;z-index:10;}
.done-box{background:var(--cream);border-radius:28px;padding:36px 26px;box-shadow:var(--shadow);border:4px solid white;}
.done-star{font-size:4rem;animation:spin 2.5s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.done-box h2{font-size:1.9rem;font-weight:900;color:#FF9F43;margin:12px 0 6px;}
.done-box p{font-size:1rem;color:#777;}
.done-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.done-actions button{border:none;border-radius:50px;padding:12px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;color:white;cursor:pointer;transition:transform .15s;}
.done-actions button:hover{transform:scale(1.04);}
.btn-replay{background:linear-gradient(135deg,#7dc95e,#5cb85c);}
.btn-home{background:linear-gradient(135deg,#FF85A1,#FF9F43);}
.star-deco{position:fixed;pointer-events:none;font-size:1.3rem;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
</style>

    {w:'Cốc nước',s:'Cốc uống nước',q:'drinking glass cup water',sig:609},
    {w:'Bát cơm',s:'Bát ăn cơm',q:'bowl ceramic rice eating',sig:610},
    {w:'Cái thìa',s:'Thìa ăn nhỏ',q:'spoon silver cutlery',sig:611},
    {w:'Đèn ngủ',s:'Đèn ngủ ấm áp',q:'night lamp bedroom warm glow',sig:612},
    {w:'Xe đồ chơi',s:'Ô tô đồ chơi',q:'toy car plastic colorful child',sig:613},
    {w:'Búp bê',s:'Búp bê xinh',q:'doll toy girl',sig:614},
    {w:'Xếp hình',s:'Trò xếp hình sáng tạo',q:'building blocks lego colorful',sig:615},
    {w:'Bàn chải răng',s:'Bàn chải đánh răng',q:'toothbrush bathroom hygiene',sig:616},
    {w:'Khăn mặt',s:'Khăn mặt mềm',q:'face towel soft bathroom',sig:617},
    {w:'Cặp sách',s:'Cặp đi học',q:'school backpack children colorful',sig:618},
    {w:'Xe đạp',s:'Xe đạp nhỏ của bé',q:'kids bicycle small colorful',sig:619},
    {w:'Bóng bay',s:'Bóng bay nhiều màu',q:'colorful balloons party',sig:620},
   ]},
];

let currentLesson=null,queue=[],idx=0;
const synth=window.speechSynthesis;
function imgUrl(q,sig,w,h){return`https://source.unsplash.com/${w}x${h}/?${encodeURIComponent(q)}&sig=${sig}`;}
function getVoice(){const v=synth.getVoices();return v.find(x=>x.lang.startsWith('vi'))||v[0];}
function speakText(t){
  synth.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='vi-VN';u.rate=0.75;u.pitch=1.2;
  const vo=getVoice();if(vo)u.voice=vo;
  const btn=document.getElementById('speakBtn');
  if(btn){btn.classList.add('speaking');u.onend=()=>btn.classList.remove('speaking');}
  synth.speak(u);
}
function renderLessons(){
  const colors=['#fff0f3','#fff8e6','#edfbea','#e6f4ff','#f3eeff','#fce8ff','#e6fff9'];
  document.getElementById('lessonGrid').innerHTML=lessons.map((l,i)=>`
    <div class="lesson-card" style="background:${colors[i%colors.length]}" onclick="startLesson('${l.id}')">
      <img class="lesson-thumb" src="${imgUrl(l.thumbQ,l.thumbSig,280,90)}" alt="${l.name}" onerror="this.style.background='#e0e0e0'">
      <div class="lesson-card-body"><span class="icon">${l.icon}</span><div class="name">${l.name}</div></div>
    </div>`).join('');
}
function startLesson(id){
  currentLesson=lessons.find(l=>l.id===id);
  queue=[...currentLesson.items].sort(()=>Math.random()-.5).slice(0,8);
  idx=0;
  document.getElementById('lesson-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('learn-screen').style.display='block';
  showCard();
}
function showCard(){
  const item=queue[idx];
  const sp=document.getElementById('photoSpinner');
  sp.style.display='flex';sp.textContent='⏳';sp.style.opacity='1';
  const ph=document.getElementById('cardPhoto');
  ph.style.opacity='0';
  ph.onload=()=>{ph.style.opacity='1';sp.style.opacity='0';};
  ph.onerror=()=>{sp.textContent='🖼️';};
  ph.src=imgUrl(item.q,item.sig,500,300);
  ph.alt=item.w;
  document.getElementById('cardWord').textContent=item.w;
  document.getElementById('cardSub').textContent=item.s;
  updateProgress();
  const wrap=document.getElementById('cardWrap');
  wrap.style.animation='none';void wrap.offsetWidth;
  wrap.style.animation='popIn .4s cubic-bezier(.3,1.4,.5,1)';
  setTimeout(()=>speakText(item.w),500);
}
function speak(){speakText(queue[idx].w);}
function nextCard(){idx++;if(idx>=queue.length){showDone();return;}showCard();}
function updateProgress(){
  document.getElementById('progFill').style.width=((idx+1)/queue.length*100)+'%';
  document.getElementById('progText').textContent=`${idx+1}/${queue.length}`;
}
function showDone(){
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  speakText('Giỏi lắm! Bé học rất tốt!');
}
function replay(){startLesson(currentLesson.id);}
function goBack(){
  synth.cancel();
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('lesson-screen').style.display='block';
}
synth.onvoiceschanged=()=>{};
renderLessons();
</script>
</body>
