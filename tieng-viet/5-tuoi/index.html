<style>
:root{--bg:#0d1117;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.12);--yellow:#FBBF24;--cyan:#22D3EE;--rose:#F43F5E;--emerald:#10B981;--violet:#8B5CF6;--orange:#F97316;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:radial-gradient(ellipse at 20% 20%,#1e1b4b 0%,#0d1117 50%,#0c1a0e 100%);min-height:100vh;color:white;overflow-x:hidden;}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite;}
@keyframes gridMove{from{background-position:0 0}to{background-position:0 40px}}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);animation:orbFloat ease-in-out infinite alternate;}
.orb-1{width:300px;height:300px;top:-50px;left:-80px;background:rgba(139,92,246,.25);animation-duration:8s;}
.orb-2{width:200px;height:200px;bottom:50px;right:-50px;background:rgba(34,211,238,.2);animation-duration:6s;}
@keyframes orbFloat{from{transform:translate(0,0)}to{transform:translate(30px,-30px)}}
header{position:relative;z-index:10;text-align:center;padding:28px 20px 14px;}
header h1{font-family:'Fredoka One',cursive;font-size:2.4rem;letter-spacing:2px;background:linear-gradient(90deg,#FBBF24,#F97316,#F43F5E,#8B5CF6,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header p{color:rgba(255,255,255,.5);font-size:.95rem;margin-top:4px;}
#lesson-screen{position:relative;z-index:10;max-width:680px;margin:0 auto;padding:6px 18px 40px;}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.lesson-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;cursor:pointer;transition:transform .2s,border-color .2s;overflow:hidden;}
.lesson-card:hover{transform:translateY(-5px) scale(1.04);border-color:var(--yellow);}
.lesson-thumb{width:100%;height:75px;object-fit:cover;background:#111;}
.lesson-card-body{padding:8px 8px 12px;text-align:center;}
.lesson-card .icon{font-size:1.3rem;}
.lesson-card .name{font-size:.8rem;font-weight:800;color:rgba(255,255,255,.85);margin-top:3px;}
#learn-screen{display:none;max-width:560px;margin:0 auto;padding:10px 18px 40px;position:relative;z-index:10;}
.hud{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.btn-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:white;border-radius:12px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:.15s;}
.btn-back:hover{background:rgba(255,255,255,.15);}
.hp-row{display:flex;gap:4px;}
.hp-heart{font-size:1.1rem;transition:.3s;}
.hp-heart.lost{filter:grayscale(1);opacity:.3;}
.prog-wrap{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#22D3EE,#8B5CF6);border-radius:8px;transition:width .5s;}
.coin-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);border-radius:50px;padding:4px 12px;font-size:.9rem;font-weight:800;color:var(--yellow);}
.q-box{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:22px 18px 18px;backdrop-filter:blur(16px);animation:slideUp .45s cubic-bezier(.2,1.3,.4,1);}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.q-type{font-size:.75rem;font-weight:800;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:8px;}
.q-prompt{font-family:'Fredoka One',cursive;font-size:2.2rem;letter-spacing:1px;background:linear-gradient(135deg,white,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.q-hint{font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:10px;}
.speak-btn{background:linear-gradient(135deg,var(--violet),var(--cyan));border:none;border-radius:10px;padding:7px 18px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;color:white;cursor:pointer;transition:.15s;margin-bottom:14px;}
.speak-btn:hover{transform:scale(1.06);}
/* 4-choice real image grid */
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:14px;cursor:pointer;transition:.2s;text-align:center;overflow:hidden;}
.choice:hover:not(:disabled){border-color:rgba(255,255,255,.4);transform:scale(1.04);}
.choice-img-wrap{width:100%;height:100px;overflow:hidden;background:#111;position:relative;}
.c-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s;}
.c-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:#111;}
.c-text{padding:7px 4px;font-size:.88rem;font-weight:800;color:rgba(255,255,255,.8);}
.choice.correct{border-color:var(--emerald);background:rgba(16,185,129,.18);animation:correctBounce .4s;}
.choice.wrong{border-color:var(--rose);background:rgba(244,63,94,.15);animation:wrongShake .4s;}
@keyframes correctBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.choice:disabled{cursor:default;}
.feedback{text-align:center;font-size:1.1rem;font-weight:900;margin-top:12px;min-height:26px;}
.feedback.ok{color:var(--emerald);}
.feedback.no{color:var(--rose);}
.streak-wrap{text-align:center;margin-top:6px;min-height:24px;}
.streak-badge{display:inline-block;background:rgba(251,191,36,.2);border:1px solid rgba(251,191,36,.5);border-radius:50px;padding:2px 14px;font-size:.82rem;font-weight:800;color:var(--yellow);animation:popIn .3s;}
.next-btn{display:block;margin:14px auto 0;background:linear-gradient(135deg,var(--emerald),var(--cyan));border:none;border-radius:12px;padding:11px 32px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;color:white;cursor:pointer;transition:.15s;opacity:0;pointer-events:none;}
.next-btn.show{opacity:1;pointer-events:all;animation:popIn .3s;}
@keyframes popIn{from{transform:scale(.8)}to{transform:scale(1)}}
.next-btn:hover{transform:scale(1.05);}
#done-screen{display:none;max-width:400px;margin:0 auto;padding:30px 18px;text-align:center;position:relative;z-index:10;}
.done-box{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:36px 24px;backdrop-filter:blur(16px);}
.done-trophy{font-size:4rem;animation:float 2s ease-in-out infinite;display:block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.done-title{font-family:'Fredoka One',cursive;font-size:2.2rem;background:linear-gradient(90deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:14px 0 6px;}
.done-stats{display:flex;justify-content:center;gap:14px;margin:16px 0;}
.stat-box{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;text-align:center;}
.stat-num{font-size:1.7rem;font-weight:900;}
.stat-label{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:700;}
.done-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.done-actions button{border:none;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:white;cursor:pointer;transition:.15s;}
.done-actions button:hover{transform:scale(1.04);}
.btn-replay{background:linear-gradient(135deg,var(--emerald),#059669);}
.btn-home{background:linear-gradient(135deg,var(--violet),var(--rose));}
</style>
</head>

    {w:'Hình chữ nhật',hint:'Dài hơn hình vuông',q:'rectangle shape wooden block',sig:510},

    {w:'Nhỏ',hint:'Kích thước bé',q:'tiny small mouse miniature',sig:512},

let currentLesson=null,queue=[],idx=0;
let score=0,coins=0,hp=3,streak=0,maxStreak=0,answered=false;
const synth=window.speechSynthesis;
function getVoice(){const v=synth.getVoices();return v.find(x=>x.lang.startsWith('vi'))||v[0];}
function speakText(t){synth.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=0.82;u.pitch=1.05;const vo=getVoice();if(vo)u.voice=vo;synth.speak(u);}
function renderHp(){document.getElementById('hpRow').innerHTML=[...Array(3)].map((_,i)=>`<span class="hp-heart${i>=hp?' lost':''}">❤️</span>`).join('');}
function renderLessons(){
  document.getElementById('lessonGrid').innerHTML=lessons.map(l=>`
    <div class="lesson-card" onclick="startLesson('${l.id}')" style="border-color:${l.color}44">
      <img class="lesson-thumb" src="${imgUrl(l.tQ,l.tS,240,75)}" alt="${l.name}" onerror="this.style.background='#1a1a2e'">
      <div class="lesson-card-body"><span class="icon">${l.icon}</span><div class="name">${l.name}</div></div>
    </div>`).join('');
}
function startLesson(id){
  currentLesson=lessons.find(l=>l.id===id);
  queue=[...currentLesson.items].sort(()=>Math.random()-.5).slice(0,8);
  idx=0;score=0;coins=0;hp=3;streak=0;maxStreak=0;answered=false;
  document.getElementById('lesson-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('learn-screen').style.display='block';
  document.getElementById('coins').textContent=0;
  renderHp();renderQ();
}
function makeChoiceHTML(c,correctWord){
  const spId='csp'+c.sig,imgId='cim'+c.sig;
  return `
    <button class="choice" onclick="checkAns(this,'${c.w}','${correctWord}')">
      <div class="choice-img-wrap">
        <div class="c-spinner" id="${spId}">⏳</div>
        <img class="c-img" id="${imgId}" src="" alt="${c.w}" style="opacity:0"
          onload="this.style.opacity='1';document.getElementById('${spId}').style.display='none'"
          onerror="document.getElementById('${spId}').textContent='🖼️'">
      </div>
      <div class="c-text">${c.w}</div>
    </button>`;
}
function renderQ(){
  answered=false;
  const correct=queue[idx];
  const pool=currentLesson.items.filter(it=>it.w!==correct.w);
  const wrongs=pool.sort(()=>Math.random()-.5).slice(0,3);
  const choices=[correct,...wrongs].sort(()=>Math.random()-.5);
  document.getElementById('qPrompt').textContent=correct.w.toUpperCase();
  document.getElementById('qHint').textContent=correct.hint;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('streakWrap').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progFill').style.width=((idx+1)/queue.length*100)+'%';
  document.getElementById('choicesGrid').innerHTML=choices.map(c=>makeChoiceHTML(c,correct.w)).join('');
  choices.forEach(c=>{const el=document.getElementById('cim'+c.sig);if(el)el.src=imgUrl(c.q,c.sig,260,100);});
  const box=document.getElementById('qBox');
  box.style.animation='none';void box.offsetWidth;box.style.animation='slideUp .45s cubic-bezier(.2,1.3,.4,1)';
  setTimeout(()=>speakText(correct.w),400);
}
function speakQ(){speakText(queue[idx].w);}
function checkAns(btn,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  const sw=document.getElementById('streakWrap');
  if(chosen===correct){
    btn.classList.add('correct');streak++;if(streak>maxStreak)maxStreak=streak;
    const bonus=streak>=3?2:1;coins+=bonus;score++;
    document.getElementById('coins').textContent=coins;
    fb.textContent=streak>=3?`🔥 STREAK x${streak}! +${bonus} xu!`:'✅ Đúng rồi! Tuyệt!';
    fb.className='feedback ok';
    if(streak>=3)sw.innerHTML=`<span class="streak-badge">🔥 Streak ${streak} liên tiếp!</span>`;
    speakText(streak>=3?`Xuất sắc! Streak ${streak} lần!`:'Đúng rồi! Giỏi lắm!');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.querySelector('.c-text').textContent===correct)b.classList.add('correct');});
    streak=0;hp=Math.max(0,hp-1);renderHp();
    fb.textContent='❌ Chưa đúng! Đáp án: '+correct;
    fb.className='feedback no';
    speakText('Chưa đúng! Đáp án đúng là '+correct);
  }
  document.getElementById('nextBtn').classList.add('show');
}
function nextQ(){idx++;if(idx>=queue.length||hp<=0){showDone();return;}renderQ();}
function showDone(){
  document.getElementById('learn-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  const pct=score/queue.length;
  document.getElementById('doneTrophy').textContent=pct>=.9?'🏆':pct>=.7?'🥈':'🥉';
  document.getElementById('doneTitle').textContent=pct>=.9?'Xuất sắc!':pct>=.7?'Giỏi lắm!':'Cố gắng thêm!';
  document.getElementById('statCorrect').textContent=`${score}/${queue.length}`;
  document.getElementById('statCoins').textContent=coins;
  document.getElementById('statStreak').textContent=maxStreak;
  speakText(`Bé đã đúng ${score} trên ${queue.length} câu và kiếm ${coins} xu!`);
}
function replay(){startLesson(currentLesson.id);}
function goBack(){synth.cancel();document.getElementById('learn-screen').style.display='none';document.getElementById('done-screen').style.display='none';document.getElementById('lesson-screen').style.display='block';}
synth.onvoiceschanged=()=>{};
renderLessons();
</script>
