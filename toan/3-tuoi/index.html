<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg: #fff9f0;
  --card: #ffffff;
  --purple: #b388ff;
  --pink: #f48fb1;
  --teal: #4dd0e1;
  --yellow: #ffd54f;
  --green: #81c784;
  --orange: #ffb74d;
  --text: #3d2c5e;
  --muted: #9e8fc0;
  --radius: 28px;
  --shadow: 0 8px 32px rgba(100,60,180,0.13);
}
html,body{min-height:100%;background:var(--bg);font-family:'Baloo 2',sans-serif;color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:40px;}

/* BG blobs */
.blob{position:fixed;border-radius:50%;opacity:.13;pointer-events:none;z-index:0;}
.blob1{width:320px;height:320px;background:var(--purple);top:-80px;left:-80px;}
.blob2{width:260px;height:260px;background:var(--pink);bottom:-60px;right:-60px;}
.blob3{width:180px;height:180px;background:var(--teal);top:40%;left:-60px;}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:460px;padding:16px;position:relative;z-index:1;}
.screen.active{display:flex;}

/* HEADER */
#app-header{
  width:100%;max-width:460px;position:sticky;top:0;z-index:100;
  background:rgba(255,249,240,0.85);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:2px solid rgba(179,136,255,0.15);
}
#app-header h1{font-size:18px;font-weight:900;color:var(--text);}
.hbtn{border:none;background:rgba(179,136,255,0.15);color:var(--text);border-radius:12px;padding:6px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Baloo 2',sans-serif;}
.hbtn:active{background:rgba(179,136,255,0.3);}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:24px 20px;width:100%;box-shadow:var(--shadow);margin-bottom:16px;border:2px solid rgba(179,136,255,0.1);}
.card-title{font-size:20px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:18px;}

/* MENU */
.menu-hero{font-size:80px;text-align:center;margin:24px 0 8px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.menu-title{font-size:28px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px;}
.menu-sub{font-size:15px;color:var(--muted);text-align:center;margin-bottom:24px;}
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.lesson-btn{
  border:none;border-radius:24px;padding:22px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
}
.lesson-btn:active{transform:scale(.93);}
.lesson-btn .lb-icon{font-size:48px;line-height:1;}
.lesson-btn .lb-num{font-size:11px;font-weight:800;color:rgba(255,255,255,0.85);letter-spacing:1px;}
.lesson-btn .lb-title{font-size:15px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.2);}
.lesson-btn .lb-desc{font-size:11px;color:rgba(255,255,255,0.8);}
.l1{background:linear-gradient(135deg,#f093fb,#f5576c);}
.l2{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.l3{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.l4{background:linear-gradient(135deg,#fa709a,#fee140);}

/* GAME HEADER */
.game-top{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:10px;}
.ginfo{font-size:13px;font-weight:800;color:var(--text);background:rgba(179,136,255,0.15);padding:6px 14px;border-radius:12px;}
.ginfo.home{cursor:pointer;border:none;font-family:'Baloo 2',sans-serif;}
.ginfo.home:active{background:rgba(179,136,255,0.3);}
.prog-bar{width:100%;height:10px;background:rgba(179,136,255,0.2);border-radius:5px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .4s;}

/* QUESTION CARD */
.qcard{background:var(--card);border-radius:var(--radius);padding:24px 18px 18px;width:100%;text-align:center;margin-bottom:14px;box-shadow:var(--shadow);border:2px solid rgba(179,136,255,0.12);}
.q-instruction{font-size:18px;font-weight:900;color:var(--purple);margin-bottom:16px;min-height:28px;}
.q-display{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;min-height:80px;margin-bottom:10px;}
.q-feedback{font-size:20px;font-weight:900;min-height:32px;transition:all .2s;}
.q-feedback.ok{color:#00c853;}
.q-feedback.no{color:#f44336;}

/* CHOICES */
.choices-grid{display:grid;gap:12px;width:100%;margin-bottom:14px;}
.cho-btn{
  border:3px solid transparent;border-radius:20px;
  background:#f5f0ff;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--text);
  transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 8px;
}
.cho-btn:active{transform:scale(.93);}
.cho-btn.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;}
.cho-btn.wrong{background:#ffebee;border-color:#ef9a9a;color:#c62828;animation:shk .3s;}
.cho-btn:disabled{cursor:not-allowed;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* NEXT BUTTON */
.btn-next{
  width:100%;padding:18px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--purple),#7c4dff);color:#fff;
  font-size:18px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 20px rgba(124,77,255,0.35);
  opacity:.35;pointer-events:none;transition:opacity .2s;
}
.btn-next.on{opacity:1;pointer-events:all;}
.btn-next.on:active{transform:scale(.97);}

/* PRIMARY BTN */
.btn-primary{
  width:100%;padding:16px;border-radius:18px;border:none;
  background:linear-gradient(135deg,var(--purple),#7c4dff);color:#fff;
  font-size:17px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 16px rgba(124,77,255,0.3);margin-top:12px;
}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{
  width:100%;padding:14px;border-radius:18px;border:none;
  background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1b5e20;
  font-size:16px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 16px rgba(60,180,120,0.25);margin-top:10px;
}
.btn-secondary:active{transform:scale(.97);}

/* RESULT */
.result-emoji{font-size:90px;text-align:center;margin:20px 0 10px;animation:pop .5s ease;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.result-score{font-size:52px;font-weight:900;color:var(--purple);text-align:center;margin:8px 0;}

/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;opacity:0;animation:fall 1.5s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* SPEAK BUTTON PULSE */
@keyframes speakpulse{0%{transform:scale(1)}50%{transform:scale(1.25);background:rgba(179,136,255,0.38);}100%{transform:scale(1)}}
.pulsing{animation:speakpulse .5s ease !important;}

/* COLOR SWATCHES */
.color-swatch{width:90px;height:90px;border-radius:18px;border:4px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.color-swatch:active{transform:scale(.9);}
.color-swatch.correct{border-color:#66bb6a !important;transform:scale(1.08);}
.color-swatch.wrong{border-color:#ef9a9a !important;animation:shk .3s;}
.color-swatch:disabled{cursor:not-allowed;}

/* SHAPE BUTTONS */
.shape-btn{background:#f5f0ff;border:3px solid transparent;border-radius:18px;padding:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.shape-btn:active{transform:scale(.9);}
.shape-btn.correct{background:#e8f5e9;border-color:#66bb6a;}
.shape-btn.wrong{background:#ffebee;border-color:#ef9a9a;animation:shk .3s;}
.shape-btn:disabled{cursor:not-allowed;}
</style>
</head>

<script>
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
// AUDIO
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
const AC = new (window.AudioContext||window.webkitAudioContext)();
let musicOn = true;
let bgTimer = null;
let melIdx = 0;
let audioUnlocked = false;
const MELODY = [523,587,659,698,784,659,587,523,659,784,880,784,659,523,587,659];
const BASS   = [262,262,349,349,392,392,349,349];

function updateMusicButton(){
  const btn = document.getElementById('music-btn');
  if(btn) btn.textContent = musicOn ? 'Г°ЕёЕҪВө' : 'Г°ЕёвҖқвҖЎ';
}

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  if(AC.state==='suspended') AC.resume();
  if(musicOn) startMusic();
  updateMusicButton();
}

function tone(f,type,dur,vol,delay=0){
  if(!musicOn)return;
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}
function bgTick(){
  const bpm=76,ms=60000/bpm*0.5;
  tone(MELODY[melIdx%MELODY.length],'triangle',0.35,0.09);
  if(melIdx%4===0) tone(BASS[Math.floor(melIdx/4)%BASS.length],'sine',0.55,0.06);
  melIdx++;
  bgTimer=setTimeout(bgTick,ms);
}
function startMusic(){if(!bgTimer){melIdx=0;bgTick();}}
function stopMusic(){if(bgTimer){clearTimeout(bgTimer);bgTimer=null;}}
function toggleMusic(){
  musicOn=!musicOn;
  if(musicOn) unlockAudio();
  updateMusicButton();
  musicOn?startMusic():stopMusic();
}
document.addEventListener('pointerdown',unlockAudio,{capture:true,once:true});
document.addEventListener('touchstart',unlockAudio,{capture:true,once:true});
document.addEventListener('click',e=>{
  if(e.target.matches('button,.lesson-btn,.cho-btn,.color-swatch,.shape-btn')){
    if(musicOn&&AC.state==='suspended')AC.resume();
    tone(600,'sine',0.08,0.12);
  }
},true);
const snd={
  correct:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.18,0.18,i*0.07));},
  wrong:()=>{tone(200,'sawtooth',0.25,0.18);tone(160,'sawtooth',0.2,0.14,0.1);},
  next:()=>{tone(440,'sine',0.1,0.1);tone(550,'sine',0.1,0.08,0.06);},
  cheer:()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,'triangle',0.3,0.2,i*0.07));
    setTimeout(()=>[784,1047,1319].forEach((f,i)=>tone(f,'sine',0.2,0.15,i*0.06)),700);}
};

// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
// SCREEN MANAGEMENT
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goMenu(){

const EMOJIS_6_10= ['Г°ЕёВҚЕ ','Г°ЕёЕҪЛҶ','Г°ЕёВҗВ¶','Г°ЕёЕ’В»','Г°ЕёВҚвҖў','Г°ЕёВҗв„ў','Г°ЕёЕҪвӮ¬','Г°ЕёВҰвҖһ','Г°ЕёВҚВҰ','Г°ЕёВҗВ¬','Г°ЕёЕҪВә','Г°ЕёВҰВҒ','Г°ЕёВҚвҖһ','Г°ЕёЕҪВЎ','Г°ЕёВҗВ ','Г°ЕёВ§ВҒ'];

// ГўвҖқвӮ¬ГўвҖқвӮ¬ Г„ВҗГЎВәВҫM: pool 16 cГғВўu, mГЎВ»вҖ”i sГЎВ»вҖҳ khГғВЎc nhau (1-5 cГғВі 5 sГЎВ»вҖҳ ГўвҖ вҖҷ dГғВ№ng emoji khГғВЎc nhau Г„вҖҳГЎВ»Ж’ phГғВўn biГЎВ»вҖЎt)
// Г„ВҗГЎВәВЈm bГЎВәВЈo 8 cГғВўu Г„вҖҳГҶВ°ГЎВ»ВЈc chГЎВ»ВҚn KHГғвҖқNG cГғВі 2 cГғВўu cГғВ№ng sГЎВ»вҖҳ Г„вҖҳГЎВәВҝm
function makeCountQs(emojis, minN, maxN){
  const range = maxN - minN + 1; // vd: 5 sГЎВ»вҖҳ (1-5) hoГЎВәВ·c 5 sГЎВ»вҖҳ (6-10)
  // TГЎВәВЎo pool: mГЎВ»вҖ”i sГЎВ»вҖҳ xuГЎВәВҘt hiГЎВ»вҖЎn 16/range lГЎВәВ§n (lГғВ m trГғВІn) ГўвҖ вҖҷ xГғВЎo ГўвҖ вҖҷ slice 8
  // NhГҶВ°ng Г„вҖҳГЎВ»Ж’ khГғВҙng trГғВ№ng sГЎВ»вҖҳ trong 8 cГғВўu: mГЎВ»вҖ”i sГЎВ»вҖҳ chГЎВ»вҖ° lГЎВәВҘy 1 lГЎВәВ§n trong 8 cГғВўu
  // ГўвҖ вҖҷ tГЎВәВЎo Г„вҖҳГЎВ»В§ sГЎВ»вҖҳ, xГғВЎo emoji, lГЎВәВҘy Г„вҖҳГғВәng range cГғВўu (mГЎВ»вҖ”i sГЎВ»вҖҳ 1 lГЎВәВ§n), lГЎВәВ·p nГЎВәВҝu cГЎВәВ§n Г„вҖҳГЎВ»В§ 16
  const allNums = [];
  for(let rep=0; rep<4; rep++)
    for(let n=minN; n<=maxN; n++) allNums.push(n); // 4 lГЎВәВ§n ГғвҖ” range sГЎВ»вҖҳ = 16 cГғВўu nГЎВәВҝu range=4, 20 nГЎВәВҝu range=5

  const pool16 = shuffle(allNums).slice(0,16);
  const emojiList = shuffle(emojis);

  // XГғВўy pool 16 cГғВўu
  const pool = pool16.map((count, i)=>{
    const emoji = emojiList[i % emojiList.length];
    const opts = new Set([count]);
    let tries = 0;
    while(opts.size < 3 && tries < 50){
      const r = Math.max(minN, Math.min(maxN, count + (Math.floor(Math.random()*5)-2)));
      if(r !== count) opts.add(r);
      tries++;
    }
    // fallback nГЎВәВҝu range quГғВЎ nhГЎВ»ВҸ
    if(opts.size < 3){
      for(let n=minN; n<=maxN && opts.size<3; n++) opts.add(n);
    }
    return {type:'count', emoji, count, choices:[...opts].sort(()=>Math.random()-0.5), answer:count};
  });

  // ChГЎВ»ВҚn 8 cГғВўu KHГғвҖқNG trГғВ№ng sГЎВ»вҖҳ Г„вҖҳГЎВәВҝm
  const picked = [];
  const usedNums = new Set();
  for(const q of shuffle(pool)){
    if(!usedNums.has(q.answer)){
      picked.push(q);
      usedNums.add(q.answer);
    }
    if(picked.length === 8) break;
  }
  // NГЎВәВҝu khГғВҙng Г„вҖҳГЎВ»В§ 8 (range < 8), bГЎВ»вҖў sung cГғВўu trГғВ№ng sГЎВ»вҖҳ nhГҶВ°ng khГғВЎc emoji
  if(picked.length < 8){
    for(const q of shuffle(pool)){
      if(picked.length >= 8) break;
      const alreadyIn = picked.some(p => p.answer===q.answer && p.emoji===q.emoji);
      if(!alreadyIn) picked.push({...q, emoji: emojiList[(picked.length+3)%emojiList.length]});
    }
  }
  return shuffle(picked);
}

// ГўвҖқвӮ¬ГўвҖқвӮ¬ MГғвӮ¬U: pool 16 cГғВўu, 8 cГғВўu chГЎВ»ВҚn KHГғвҖқNG trГғВ№ng tГғВӘn mГғВ u
function makeColorQs(){
  const pool = COLORS.map(c=>({
    type:'color', name:c.name, target:c.hex,
    choices:[...c.choices].sort(()=>Math.random()-0.5), answer:c.hex
  }));
  // ChГЎВ»ВҚn 8 cГғВўu khГғВҙng trГғВ№ng tГғВӘn mГғВ u
  const picked = [];
  const usedNames = new Set();
  for(const q of shuffle(pool)){
    if(!usedNames.has(q.name)){
      picked.push(q);
      usedNames.add(q.name);
    }
    if(picked.length === 8) break;
  }
  return shuffle(picked);
}

// ГўвҖқвӮ¬ГўвҖқвӮ¬ HГғЕ’NH: pool 16 cГғВўu, 8 cГғВўu chГЎВ»ВҚn KHГғвҖқNG trГғВ№ng tГғВӘn hГғВ¬nh
function makeShapeQs(){
  const UNIQUE_SHAPES = [
    {name:'HГғВ¬nh trГғВІn',    svg:'<circle cx="45" cy="45" r="38" fill="currentColor"/>',                                                          vb:'0 0 90 90'},
    {name:'HГғВ¬nh vuГғВҙng',   svg:'<rect x="8" y="8" width="74" height="74" rx="6" fill="currentColor"/>',                                         vb:'0 0 90 90'},
    {name:'Tam giГғВЎc',     svg:'<polygon points="45,5 88,85 2,85" fill="currentColor"/>',                                                        vb:'0 0 90 90'},
    {name:'HГғВ¬nh thoi',    svg:'<polygon points="45,4 88,45 45,86 2,45" fill="currentColor"/>',                                                  vb:'0 0 90 90'},
    {name:'NgГғВҙi sao',     svg:'<polygon points="45,3 56,36 90,36 63,57 74,90 45,68 16,90 27,57 0,36 34,36" fill="currentColor"/>',             vb:'0 0 90 90'},
    {name:'HГғВ¬nh chГЎВ»ВҜ nhГЎВәВӯt',svg:'<rect x="4" y="22" width="82" height="46" rx="6" fill="currentColor"/>',                                        vb:'0 0 90 90'},
  ];
  // MГЎВ»вҖ”i hГғВ¬nh lГЎВәВ·p Г„вҖҳГЎВ»Ж’ tГЎВәВЎo pool 16 (lГЎВәВ·p 2-3 lГЎВәВ§n), nhГҶВ°ng khi pick thГғВ¬ khГғВҙng trГғВ№ng tГғВӘn
  const pool = [];
  for(let rep=0; rep<3; rep++) UNIQUE_SHAPES.forEach(s => pool.push(s));

  const picked = [];
  const usedNames = new Set();
  for(const s of shuffle(pool)){
    if(!usedNames.has(s.name)){
      const others = UNIQUE_SHAPES.filter(x=>x.name!==s.name).sort(()=>Math.random()-0.5).slice(0,2);
      picked.push({type:'shape', name:s.name, target:s, choices:[s,...others].sort(()=>Math.random()-0.5), answer:s.name});
      usedNames.add(s.name);
    }
    if(picked.length === 6) break; // chГЎВ»вҖ° cГғВі 6 hГғВ¬nh unique tГЎВ»вҖҳi Г„вҖҳa
  }
  return shuffle(picked); // trГЎВәВЈ vГЎВ»ВҒ tГЎВ»вҖҳi Г„вҖҳa 6 cГғВўu khГғВҙng trГғВ№ng (bГғВ i hГғВ¬nh chГЎВ»вҖ° cГғВі 6 hГғВ¬nh)
}

// SPEECH (Web Speech API)
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
let speechTimer1=null, speechTimer2=null;

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'vi-VN';
  u.rate = 0.85;
  u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

function speakQuestion(text){
  // Cancel any pending repeat
  clearTimeout(speechTimer1);
  clearTimeout(speechTimer2);
  window.speechSynthesis && window.speechSynthesis.cancel();
  // Pulse the speaker icon
  const btn = document.getElementById('speak-btn');
  if(btn){ btn.classList.add('pulsing'); setTimeout(()=>btn.classList.remove('pulsing'),600); }
  speak(text);
  speechTimer2 = setTimeout(()=>{
    speak(text);
    if(btn){ btn.classList.add('pulsing'); setTimeout(()=>btn.classList.remove('pulsing'),600); }
  }, 2200);
}

function renderQuestion(){
  qAnswered=false;
  const q=questions[qIdx];
  const total=questions.length;
  document.getElementById('gi-prog').textContent=(qIdx+1)+'/'+total;
  document.getElementById('gi-stars').textContent='ГўВӯВҗ '+qStars;
  document.getElementById('prog-fill').style.width=(qIdx/total*100)+'%';
  document.getElementById('q-feedback').textContent='';
  document.getElementById('q-feedback').className='q-feedback';
  document.getElementById('btn-next').classList.remove('on');

  // Build speech text & instruction per type
  let speechText='', instruction='';
  const colors=['#b388ff','#f48fb1','#4dd0e1','#ffd54f','#81c784','#ffb74d'];

  if(q.type==='count'){
    speechText = 'SГЎВ»вҖҳ ' + q.answer;
    instruction = 'BГғВ© nghe rГЎВ»вҖңi chГЎВ»ВҚn sГЎВ»вҖҳ Г„вҖҳГғВәng!';
    // Show emojis so bГғВ© can count along
    document.getElementById('q-display').innerHTML=
      `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
        ${Array(q.count).fill(`<span style="font-size:${q.count>7?38:46}px;line-height:1;">${q.emoji}</span>`).join('')}
      </div>`;
    const cg=document.getElementById('choices-grid');
    cg.style.gridTemplateColumns='repeat(3,1fr)';
    cg.innerHTML=q.choices.map(c=>
      `<button class="cho-btn" style="font-size:34px;padding:18px 6px;" onclick="pick(this,'${c}','${q.answer}')">${c}</button>`
    ).join('');

  } else if(q.type==='color'){
    speechText = 'MГғВ u ' + q.name;
    instruction = 'BГғВ© nghe rГЎВ»вҖңi chГЎВ»ВҚn mГғВ u Г„вҖҳГғВәng!';
    // No color sample shown ГўвӮ¬вҖқ only voice
    document.getElementById('q-display').innerHTML='';
    const cg=document.getElementById('choices-grid');
    cg.style.gridTemplateColumns='repeat(3,1fr)';
    cg.innerHTML=q.choices.map(hex=>
      `<button class="color-swatch" style="background:${hex};" onclick="pickColor(this,'${hex}','${q.answer}')"></button>`
    ).join('');

  } else if(q.type==='shape'){
    speechText = q.name;
    instruction = 'BГғВ© nghe rГЎВ»вҖңi chГЎВ»ВҚn hГғВ¬nh Г„вҖҳГғВәng!';
    // No shape sample shown ГўвӮ¬вҖқ only voice
    document.getElementById('q-display').innerHTML='';
    const cg=document.getElementById('choices-grid');
    cg.style.gridTemplateColumns='repeat(3,1fr)';
    cg.innerHTML=q.choices.map((s,i)=>
      `<button class="shape-btn" onclick="pickShape(this,'${s.name}','${q.answer}')">
        <svg viewBox="${s.vb}" width="64" height="64" style="color:${colors[(qIdx+i)%colors.length]};">${s.svg}</svg>
      </button>`
    ).join('');
  }

  document.getElementById('q-instruction').innerHTML =
    `<span>${instruction}</span>
     <button id="speak-btn" onclick="speakQuestion('${speechText}')" title="Nghe lГЎВәВЎi"
       style="margin-left:10px;border:none;background:rgba(179,136,255,0.18);
              border-radius:50%;width:44px;height:44px;font-size:22px;cursor:pointer;
              vertical-align:middle;transition:transform .15s,background .15s;font-family:'Baloo 2',sans-serif;">
       Г°ЕёвҖқЕ 
     </button>`;

  // Auto-speak on question load (small delay so page renders first)
  clearTimeout(speechTimer1);
  speechTimer1 = setTimeout(()=>speakQuestion(speechText), 400);
}

function pick(btn, val, answer){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll('#choices-grid .cho-btn').forEach(b=>b.disabled=true);
  handleResult(btn, parseInt(val)===parseInt(answer));
}
function pickColor(btn, val, answer){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll('#choices-grid .color-swatch').forEach(b=>b.disabled=true);
  handleResult(btn, val===answer, 'color-swatch');
}
function pickShape(btn, val, answer){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll('#choices-grid .shape-btn').forEach(b=>b.disabled=true);
  handleResult(btn, val===answer, 'shape-btn');
}

function handleResult(btn, correct, cls='cho-btn'){
  const fb=document.getElementById('q-feedback');
  if(correct){
    btn.classList.add('correct');
    fb.textContent='Г°ЕёЕ’Её Г„ВҗГғВәng rГЎВ»вҖңi! GiГЎВ»ВҸi quГғВЎ!';
    fb.className='q-feedback ok';
    qStars++;
    totalStars++;
    document.getElementById('gi-stars').textContent='ГўВӯВҗ '+qStars;
    document.getElementById('hdr-stars').textContent='ГўВӯВҗ '+totalStars;
    snd.correct();
  } else {
    btn.classList.add('wrong');
    fb.textContent='Г°ЕёвҖҷв„ў ChГҶВ°a Г„вҖҳГғВәng, thГЎВ»Вӯ cГғВўu khГғВЎc nhГғВ©!';
    fb.className='q-feedback no';
    // highlight correct
    if(cls==='cho-btn'){
      document.querySelectorAll('.cho-btn').forEach(b=>{
        if(b.textContent.trim()===String(questions[qIdx].answer)) b.classList.add('correct');
      });
    } else if(cls==='color-swatch'){
      document.querySelectorAll('.color-swatch').forEach(b=>{
        if(b.style.background===questions[qIdx].answer||b.style.backgroundColor===questions[qIdx].answer) b.classList.add('correct');
      });
    } else {
      document.querySelectorAll('.shape-btn').forEach(b=>{
        if(b.getAttribute('onclick').includes(`'${questions[qIdx].answer}'`)) b.classList.add('correct');
      });
    }
    snd.wrong();
  }
  document.getElementById('btn-next').classList.add('on');
}

function nextQuestion(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  clearTimeout(speechTimer1); clearTimeout(speechTimer2);
  qIdx++;
  if(qIdx>=questions.length){
    showResult();
  } else {
    snd.next();
    renderQuestion();
  }
}

function showResult(){
  const total=questions.length;
  let emoji='Г°ЕёвҖҷВӘ',title='CГЎВ»вҖҳ gГЎВәВҜng lГғВӘn!',msg='LГЎВәВ§n sau bГғВ© sГЎВәВҪ lГғВ m tГЎВ»вҖҳt hГҶВЎn nhГғВ©! Г°ЕёЕ’ЛҶ';
  if(qStars===total){emoji='Г°ЕёВҸвҖ ';title='XuГЎВәВҘt sГЎВәВҜc! Г°ЕёЕ’Её';msg='BГғВ© giГЎВ»ВҸi quГғВЎ! Г„ВҗГғВәng hГЎВәВҝt rГЎВ»вҖңi! TuyГЎВ»вҖЎt vГЎВ»Вқi!';snd.cheer();}
  else if(qStars>=total*0.75){emoji='Г°ЕёЕҪвҖ°';title='RГЎВәВҘt giГЎВ»ВҸi! Г°ЕёвҖҳВҸ';msg='BГғВ© hГЎВ»ВҚc tГЎВ»вҖҳt lГЎВәВҜm! GГЎВәВ§n hoГғВ n hГЎВәВЈo rГЎВ»вҖңi!';snd.correct();}
  else if(qStars>=total*0.5){emoji='Г°ЕёЛңЕ ';title='GiГЎВ»ВҸi lГЎВәВҜm! Г°ЕёвҖҳВҚ';msg='BГғВ© lГғВ m Г„вҖҳГҶВ°ГЎВ»ВЈc nhiГЎВ»ВҒu cГғВўu rГЎВ»вҖңi! TiГЎВәВҝp tГЎВ»ВҘc nhГғВ©!';snd.correct();}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-score').textContent=qStars+' / '+total+' ГўВӯВҗ';
  showScreen('screen-result');
  if(qStars===total) launchConfetti();
}

const CONF_COLORS=['#f44336','#2196f3','#ffeb3b','#4caf50','#9c27b0','#ff9800','#e91e63'];
function launchConfetti(){
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`
        left:${Math.random()*100}vw;
        background:${CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)]};
        width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;
        animation-duration:${1+Math.random()*1.5}s;
        animation-delay:${Math.random()*0.5}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2500);
    },i*30);
  }
}
