<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Học Toán</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #FF6B6B; --c1l: #FFE8E8;
    --c2: #FF9F43; --c2l: #FFF3E0;
    --c3: #1DD1A1; --c3l: #E0FFF6;
    --c4: #54A0FF; --c4l: #E8F3FF;
    --c5: #A29BFE; --c5l: #EEEEFF;
    --bg: #FFF9F0;
    --card-shadow: 0 4px 0px;
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image: radial-gradient(circle at 20% 20%, #FFE8E8 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, #E8F3FF 0%, transparent 40%);
  }

  /* SCREEN MANAGEMENT */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME SCREEN */
  #home { text-align: center; padding: 2rem 1rem 3rem; }
  .home-title {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 800;
    color: #2d3436;
    margin-bottom: 0.25rem;
    line-height: 1.1;
  }
  .home-sub { font-size: 1rem; color: #888; margin-bottom: 2.5rem; font-weight: 600; }
  .home-stars { font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 2rem; }

  .lessons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
    max-width: 620px;
    margin: 0 auto;
  }
  .lesson-card {
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .lesson-card:hover { transform: translateY(-3px); }
  .lesson-card:active { transform: translateY(1px); }
  .lesson-card .deco {
    position: absolute;
    right: -10px; top: -10px;
    font-size: 5rem;
    opacity: 0.15;
    pointer-events: none;
  }
  .lesson-card .tag {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px;
    margin-bottom: 0.75rem;
    background: rgba(255,255,255,0.6);
  }
  .lesson-card h2 { font-family: 'Baloo 2', cursive; font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; }
  .lesson-card p { font-size: 0.85rem; opacity: 0.75; font-weight: 600; }
  .lesson-card .num { font-size: 0.75rem; font-weight: 700; opacity: 0.5; margin-top: 0.75rem; }

  .l1 { background: var(--c1l); border-color: var(--c1); box-shadow: var(--card-shadow) var(--c1); color: #c0392b; }
  .l2 { background: var(--c2l); border-color: var(--c2); box-shadow: var(--card-shadow) var(--c2); color: #d35400; }
  .l3 { background: var(--c3l); border-color: var(--c3); box-shadow: var(--card-shadow) var(--c3); color: #0a7c5c; }
  .l4 { background: var(--c4l); border-color: var(--c4); box-shadow: var(--card-shadow) var(--c4); color: #1a6fc4; }
  .l5 { background: var(--c5l); border-color: var(--c5); box-shadow: var(--card-shadow) var(--c5); color: #6c63c7; }

  /* QUIZ SCREEN */
  #quiz { padding: 1.25rem 1rem 2rem; max-width: 680px; margin: 0 auto; }
  .quiz-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .back-btn {
    width: 42px; height: 42px; border-radius: 12px;
    border: 2.5px solid currentColor; background: transparent;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .back-btn:hover { transform: scale(1.08); }
  .quiz-title { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 700; }
  .quiz-sub { font-size: 0.8rem; font-weight: 600; opacity: 0.6; }
  .refresh-btn {
    margin-left: auto; padding: 8px 16px;
    border-radius: 12px; border: 2.5px solid currentColor;
    background: transparent; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; gap: 6px;
    transition: transform 0.1s, background 0.15s;
    white-space: nowrap;
  }
  .refresh-btn:hover { transform: scale(1.04); background: rgba(255,255,255,0.4); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
  }
  .q-card {
    border-radius: var(--radius);
    padding: 1.25rem 1rem;
    border: 3px solid transparent;
    min-height: 130px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    animation: popIn 0.3s ease both;
    text-align: center;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .q-card:nth-child(2) { animation-delay: 0.04s; }
  .q-card:nth-child(3) { animation-delay: 0.08s; }
  .q-card:nth-child(4) { animation-delay: 0.12s; }
  .q-card:nth-child(5) { animation-delay: 0.16s; }
  .q-card:nth-child(6) { animation-delay: 0.20s; }
  .q-card:nth-child(7) { animation-delay: 0.24s; }
  .q-card:nth-child(8) { animation-delay: 0.28s; }

  .q-num {
    font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
    opacity: 0.45; align-self: flex-start;
  }
  .q-text {
    font-size: 1.25rem; font-weight: 800; line-height: 1.5;
    word-break: break-word;
  }
  .q-line {
    width: 48px; height: 3px; border-radius: 4px;
    opacity: 0.35;
    background: currentColor;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-stars">⭐ ⭐ ⭐</div>
  <div class="home-title">Bé Học Toán</div>
  <div class="home-sub">Chọn bài học để bắt đầu nào!</div>
  <div class="lessons-grid" id="lessonsGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" id="backBtn" onclick="goHome()">←</button>
    <div>
      <div class="quiz-title" id="quizTitle"></div>
      <div class="quiz-sub" id="quizSub"></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshQuiz()">🔀 Đổi bài</button>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<script>

  {
    id: 1, cls: 'l1', icon: '🍎',

    questions: [
      { q: '🍎🍎🍎\nCó mấy quả táo?' },
      { q: '🐶🐶\nCó mấy con chó?' },
      { q: '⭐⭐⭐⭐\nCó mấy ngôi sao?' },
      { q: '🐱🐱🐱🐱🐱\nCó mấy con mèo?' },
      { q: '🌸🌸\nCó mấy bông hoa?' },
      { q: '🚗🚗🚗\nCó mấy ô tô?' },
      { q: '🍌🍌🍌🍌\nCó mấy quả chuối?' },
      { q: '🐸\nCó mấy con ếch?' },
      { q: '🎈🎈🎈🎈🎈\nCó mấy bóng bay?' },
      { q: '🦋🦋\nCó mấy con bướm?' },
      { q: '🍊🍊🍊\nCó mấy quả cam?' },
      { q: '🐥🐥🐥🐥\nCó mấy con gà con?' },
      { q: '🌙🌙🌙\nCó mấy mặt trăng?' },
      { q: '🍕🍕\nCó mấy cái bánh?' },
      { q: '🐠🐠🐠\nCó mấy con cá?' },
      { q: '🏠🏠🏠🏠\nCó mấy ngôi nhà?' },
      { q: '🌈\nCó mấy cầu vồng?' },
      { q: '🎁🎁🎁🎁🎁\nCó mấy món quà?' },
      { q: '🐇🐇\nCó mấy con thỏ?' },
      { q: '🍦🍦🍦\nCó mấy cây kem?' },
    ]
  },
  {
    id: 2, cls: 'l2', icon: '➕',
    tag: 'BÀI 2',
    title: 'Phép cộng',
    desc: 'Tính tổng hai số nhỏ',
    questions: [
      { q: '1 + 1 = ?' },
      { q: '2 + 1 = ?' },
      { q: '1 + 2 = ?' },
      { q: '2 + 2 = ?' },
      { q: '3 + 1 = ?' },
      { q: '1 + 3 = ?' },
      { q: '4 + 1 = ?' },
      { q: '2 + 3 = ?' },
      { q: '3 + 2 = ?' },
      { q: '1 + 4 = ?' },
      { q: '0 + 1 = ?' },
      { q: '0 + 2 = ?' },
      { q: '0 + 3 = ?' },
      { q: '0 + 4 = ?' },
      { q: '0 + 5 = ?' },
      { q: '1 + 0 = ?' },
      { q: '2 + 0 = ?' },
      { q: '3 + 0 = ?' },
      { q: '4 + 0 = ?' },
      { q: '5 + 0 = ?' },
    ]
  },
  {
    id: 3, cls: 'l3', icon: '➖',
    tag: 'BÀI 3',
    title: 'Phép trừ',
    desc: 'Tính hiệu hai số nhỏ',
    questions: [
      { q: '2 − 1 = ?' },
      { q: '3 − 1 = ?' },
      { q: '4 − 1 = ?' },
      { q: '5 − 1 = ?' },
      { q: '3 − 2 = ?' },
      { q: '4 − 2 = ?' },
      { q: '5 − 2 = ?' },
      { q: '4 − 3 = ?' },
      { q: '5 − 3 = ?' },
      { q: '5 − 4 = ?' },
      { q: '2 − 0 = ?' },
      { q: '3 − 0 = ?' },
      { q: '4 − 0 = ?' },
      { q: '5 − 0 = ?' },
      { q: '1 − 0 = ?' },
      { q: '5 − 5 = ?' },
      { q: '4 − 4 = ?' },
      { q: '3 − 3 = ?' },
      { q: '2 − 2 = ?' },
      { q: '1 − 1 = ?' },
    ]
  },
  {
    id: 4, cls: 'l4', icon: '⚖️',
    tag: 'BÀI 4',
    title: 'So sánh số',
    desc: 'Số nào lớn hơn hay nhỏ hơn?',
    questions: [
      { q: '3  và  5\nSố nào lớn hơn?' },
      { q: '2  và  4\nSố nào lớn hơn?' },
      { q: '1  và  3\nSố nào nhỏ hơn?' },
      { q: '5  và  2\nSố nào nhỏ hơn?' },
      { q: '4  và  1\nSố nào lớn hơn?' },
      { q: '2  và  3\nSố nào nhỏ hơn?' },
      { q: '1  và  5\nSố nào lớn hơn?' },
      { q: '4  và  3\nSố nào lớn hơn?' },
      { q: '3  và  1\nSố nào nhỏ hơn?' },
      { q: '5  và  4\nSố nào nhỏ hơn?' },
      { q: '2  và  2\n2 và 2 bằng nhau?' },
      { q: '1  và  4\nSố nào nhỏ hơn?' },
      { q: '3  và  4\nSố nào lớn hơn?' },
      { q: '5  và  3\nSố nào lớn hơn?' },
      { q: '2  và  1\nSố nào lớn hơn?' },
      { q: '4  và  5\nSố nào nhỏ hơn?' },
      { q: '1  và  2\nSố nào lớn hơn?' },
      { q: '3  và  5\nSố nào nhỏ hơn?' },
      { q: '5  và  1\nSố nào lớn hơn?' },
      { q: '4  và  2\nSố nào nhỏ hơn?' },
    ]
  },
  {
    id: 5, cls: 'l5', icon: '❓',
    tag: 'BÀI 5',
    title: 'Số còn thiếu',
    desc: 'Điền số vào chỗ trống',
    questions: [
      { q: '1,  2,  ?,  4' },
      { q: '2,  ?,  4,  5' },
      { q: '?,  2,  3,  4' },
      { q: '1,  2,  3,  ?' },
      { q: '2,  3,  ?,  5' },
      { q: '?,  3,  4,  5' },
      { q: '1,  ?,  3,  4' },
      { q: '3,  4,  ?,  6' },
      { q: '?,  2,  3' },
      { q: '1,  ?,  3' },
      { q: '2,  3,  ?' },
      { q: '?,  4,  5' },
      { q: '3,  ?,  5' },
      { q: '1,  2,  3,  4,  ?' },
      { q: '?,  1,  2,  3' },
      { q: '4,  ?,  6' },
      { q: '2,  ?,  4' },
      { q: '?,  3,  4' },
      { q: '1,  2,  ?,  4,  5' },
      { q: '0,  1,  ?,  3' },
    ]
  }
];

const colorMap = {
  l1: '#c0392b', l2: '#d35400', l3: '#0a7c5c', l4: '#1a6fc4', l5: '#6c63c7'
};

let currentLesson = null;

// Build home
function buildHome() {
  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = lessons.map(l => `
    <div class="lesson-card ${l.cls}" onclick="startLesson(${l.id})">
      <div class="deco">${l.icon}</div>
      <div class="tag">${l.tag}</div>
      <h2>${l.title}</h2>
      <p>${l.desc}</p>
      <div class="num">20 câu hỏi · 8 câu mỗi lần</div>
    </div>
  `).join('');
}

function startLesson(id) {
  currentLesson = lessons.find(l => l.id === id);
  const color = colorMap[currentLesson.cls];
  document.getElementById('quizTitle').textContent = currentLesson.title;
  document.getElementById('quizSub').textContent = `${currentLesson.tag} · 8 câu ngẫu nhiên`;
  document.getElementById('backBtn').style.color = color;
  document.getElementById('refreshBtn').style.color = color;
  document.getElementById('quizTitle').style.color = color;
  document.getElementById('home').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  renderCards();
}

function goHome() {
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('home').classList.add('active');
  currentLesson = null;
}

function refreshQuiz() { renderCards(); }

function renderCards() {
  const pool = [...currentLesson.questions];
  const picked = [];
  while (picked.length < 8 && pool.length > 0) {
    const i = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(i, 1)[0]);
  }

  const cls = currentLesson.cls;
  const color = colorMap[cls];

  const bgMap = { l1: '#FFE8E8', l2: '#FFF3E0', l3: '#E0FFF6', l4: '#E8F3FF', l5: '#EEEEFF' };
  const borderMap = { l1: '#FF6B6B', l2: '#FF9F43', l3: '#1DD1A1', l4: '#54A0FF', l5: '#A29BFE' };

  document.getElementById('cardsGrid').innerHTML = picked.map((q, i) => `
    <div class="q-card" style="background:${bgMap[cls]}; border-color:${borderMap[cls]}; color:${color}; box-shadow: 0 4px 0 ${borderMap[cls]};">
      <div class="q-num">Câu ${i + 1}</div>
      <div class="q-text">${q.q.replace(/\n/g, '<br>')}</div>
      <div class="q-line"></div>
    </div>
  `).join('');
}

buildHome();
</script>
</body>
</html>
