<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bé Học Toán — 4 Tuổi</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff9f0;--card:#ffffff;
  --purple:#b388ff;--pink:#f48fb1;--teal:#4dd0e1;
  --yellow:#ffd54f;--green:#81c784;--orange:#ffb74d;
  --text:#3d2c5e;--muted:#9e8fc0;
  --radius:28px;--shadow:0 8px 32px rgba(100,60,180,0.13);
}
html,body{min-height:100%;background:var(--bg);font-family:'Baloo 2',sans-serif;color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:40px;}

.blob{position:fixed;border-radius:50%;opacity:.13;pointer-events:none;z-index:0;}
.blob1{width:320px;height:320px;background:var(--purple);top:-80px;left:-80px;}
.blob2{width:260px;height:260px;background:var(--pink);bottom:-60px;right:-60px;}
.blob3{width:180px;height:180px;background:var(--teal);top:40%;left:-60px;}

.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:460px;padding:16px;position:relative;z-index:1;}
.screen.active{display:flex;}

/* HEADER */
#app-header{
  width:100%;max-width:460px;position:sticky;top:0;z-index:100;
  background:rgba(255,249,240,0.88);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:2px solid rgba(179,136,255,0.15);
}
#app-header h1{font-size:18px;font-weight:900;color:var(--text);}
.hbtn{border:none;background:rgba(179,136,255,0.15);color:var(--text);border-radius:12px;padding:6px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Baloo 2',sans-serif;}
.hbtn:active{background:rgba(179,136,255,0.3);}

/* MENU */
.menu-hero{font-size:80px;text-align:center;margin:24px 0 8px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.menu-title{font-size:28px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px;}
.menu-sub{font-size:15px;color:var(--muted);text-align:center;margin-bottom:24px;}
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.lesson-btn{
  border:none;border-radius:24px;padding:22px 12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(0,0,0,0.12);
}
.lesson-btn:active{transform:scale(.93);}
.lesson-btn .lb-icon{font-size:48px;line-height:1;}
.lesson-btn .lb-num{font-size:11px;font-weight:800;color:rgba(255,255,255,0.85);letter-spacing:1px;}
.lesson-btn .lb-title{font-size:15px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.2);}
.lesson-btn .lb-desc{font-size:11px;color:rgba(255,255,255,0.8);text-align:center;}
.l1{background:linear-gradient(135deg,#f093fb,#f5576c);}
.l2{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.l3{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.l4{background:linear-gradient(135deg,#fa709a,#fee140);}
.l5{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}

/* GAME HEADER */
.game-top{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:10px;gap:8px;}
.ginfo{font-size:13px;font-weight:800;color:var(--text);background:rgba(179,136,255,0.15);padding:6px 12px;border-radius:12px;white-space:nowrap;}
.ginfo.btn-style{border:none;font-family:'Baloo 2',sans-serif;cursor:pointer;}
.ginfo.btn-style:active{background:rgba(179,136,255,0.3);}
.prog-bar{width:100%;height:10px;background:rgba(179,136,255,0.2);border-radius:5px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .4s;}

/* QUESTION CARD */
.qcard{
  background:var(--card);border-radius:var(--radius);padding:28px 18px 22px;
  width:100%;text-align:center;margin-bottom:14px;
  box-shadow:var(--shadow);border:2px solid rgba(179,136,255,0.12);
}
.q-label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:1.5px;margin-bottom:14px;}
.q-display{
  font-size:clamp(26px,7vw,36px);line-height:1.6;font-weight:900;color:var(--text);
  margin-bottom:10px;min-height:60px;
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;
}
.q-display.emoji-row{font-size:clamp(32px,9vw,46px);gap:4px;}
.q-feedback{font-size:20px;font-weight:900;min-height:34px;transition:all .2s;margin-top:4px;}
.q-feedback.ok{color:#00c853;}
.q-feedback.no{color:#f44336;}

/* CHOICES — 2×2 */
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin-bottom:14px;}
.cho-btn{
  border:3px solid transparent;border-radius:20px;
  background:#f5f0ff;cursor:pointer;
  font-family:'Baloo 2',sans-serif;font-weight:900;color:var(--text);
  transition:all .15s;display:flex;align-items:center;justify-content:center;
  padding:18px 8px;font-size:clamp(22px,5.5vw,30px);
  min-height:88px;line-height:1.2;text-align:center;
}
.cho-btn:active{transform:scale(.93);}
.cho-btn.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;}
.cho-btn.wrong{background:#ffebee;border-color:#ef9a9a;color:#c62828;animation:shk .3s;}
.cho-btn:disabled{cursor:not-allowed;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* NEXT BUTTON */
.btn-next{
  width:100%;padding:18px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--purple),#7c4dff);color:#fff;
  font-size:18px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 20px rgba(124,77,255,0.35);
  opacity:.3;pointer-events:none;transition:opacity .2s;
}
.btn-next.on{opacity:1;pointer-events:all;}
.btn-next.on:active{transform:scale(.97);}

/* RESULT */
.result-emoji{font-size:90px;text-align:center;margin:20px 0 10px;animation:pop .5s ease;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.card{background:var(--card);border-radius:var(--radius);padding:24px 20px;width:100%;box-shadow:var(--shadow);margin-bottom:16px;border:2px solid rgba(179,136,255,0.1);}
.card-title{font-size:20px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:18px;}
.result-score{font-size:52px;font-weight:900;color:var(--purple);text-align:center;margin:8px 0;}
.btn-primary{
  width:100%;padding:16px;border-radius:18px;border:none;
  background:linear-gradient(135deg,var(--purple),#7c4dff);color:#fff;
  font-size:17px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 16px rgba(124,77,255,0.3);margin-top:12px;
}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{
  width:100%;padding:14px;border-radius:18px;border:none;
  background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1b5e20;
  font-size:16px;font-weight:900;cursor:pointer;font-family:'Baloo 2',sans-serif;
  box-shadow:0 4px 16px rgba(60,180,120,0.25);margin-top:10px;
}
.btn-secondary:active{transform:scale(.97);}

/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;opacity:0;animation:fall 1.5s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* CARD SLIDE */
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:slideIn .25s ease both;}
</style>
</head>
<body>

<div id="audio-unlock" style="display:none;position:fixed;inset:0;background:rgba(24,18,40,.82);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;padding:24px;">
  <button id="audio-unlock-btn" style="border:none;border-radius:20px;padding:20px 32px;background:#fff;color:#3d2c5e;font:800 20px/1.3 'Baloo 2',sans-serif;box-shadow:0 12px 40px rgba(0,0,0,.3);cursor:pointer;">
    🎵 Chạm để bắt đầu & bật nhạc!
  </button>
</div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- HEADER -->
<div id="app-header">
  <button class="hbtn" id="back-btn" onclick="handleBack()">‹ Quay lại</button>
  <h1>🧮 Bé Học Toán</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="hdr-stars" style="font-size:14px;font-weight:800;color:var(--purple);">⭐ 0</span>
    <button class="hbtn" id="music-btn" onclick="toggleMusic()">🎵</button>
  </div>
</div>

<!-- ══ MENU ══ -->
<div id="screen-menu" class="screen active">
  <div class="menu-hero">🐣</div>
  <div class="menu-title">Bé Học Toán!</div>
  <div class="menu-sub">Dành cho bé 4 tuổi 💛</div>
  <div class="lesson-grid">
    <button class="lesson-btn l1" onclick="startLesson('count')">
      <div class="lb-icon">🍎</div>
      <div class="lb-num">BÀI 1</div>
      <div class="lb-title">Đếm số lượng</div>
      <div class="lb-desc">Đếm đồ vật</div>
    </button>
    <button class="lesson-btn l2" onclick="startLesson('add')">
      <div class="lb-icon">➕</div>
      <div class="lb-num">BÀI 2</div>
      <div class="lb-title">Phép cộng</div>
      <div class="lb-desc">Cộng hai số nhỏ</div>
    </button>
    <button class="lesson-btn l3" onclick="startLesson('sub')">
      <div class="lb-icon">➖</div>
      <div class="lb-num">BÀI 3</div>
      <div class="lb-title">Phép trừ</div>
      <div class="lb-desc">Trừ hai số nhỏ</div>
    </button>
    <button class="lesson-btn l4" onclick="startLesson('compare')">
      <div class="lb-icon">⚖️</div>
      <div class="lb-num">BÀI 4</div>
      <div class="lb-title">So sánh số</div>
      <div class="lb-desc">Lớn hơn hay nhỏ hơn?</div>
    </button>
    <button class="lesson-btn l5" onclick="startLesson('missing')" style="grid-column:span 2;">
      <div class="lb-icon">❓</div>
      <div class="lb-num">BÀI 5</div>
      <div class="lb-title">Số còn thiếu</div>
      <div class="lb-desc">Điền số vào dãy số</div>
    </button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="screen-game" class="screen">
  <div class="game-top">
    <div class="ginfo" id="gi-lesson" style="flex:1;overflow:hidden;text-overflow:ellipsis;">Bài 1</div>
    <div class="ginfo" id="gi-prog">1/8</div>
    <div class="ginfo" id="gi-stars">⭐ 0</div>
    <button class="ginfo btn-style" onclick="goMenu()">🏠</button>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="qcard" id="qcard">
    <div class="q-label" id="q-label">CÂU HỎI</div>
    <div class="q-display" id="q-display"></div>
    <div class="q-feedback" id="q-feedback"></div>
  </div>
  <div class="choices-grid" id="choices-grid"></div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
</div>

<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <div class="result-emoji" id="res-emoji">🏆</div>
  <div class="card">
    <div class="card-title" id="res-title">Xuất sắc!</div>
    <div class="card-sub" id="res-msg"></div>
    <div class="result-score" id="res-score">8/8 ⭐</div>
    <button class="btn-primary" onclick="replayLesson()">🔄 Làm lại</button>
    <button class="btn-secondary" onclick="goMenu()">🏠 Về menu</button>
  </div>
</div>

<script>
// ══════ AUDIO ══════
const AC=new (window.AudioContext||window.webkitAudioContext)();
let musicOn=true,bgTimer=null,melIdx=0;
const MELODY=[523,587,659,698,784,659,587,523,659,784,880,784,659,523,587,659];
const BASS=[262,262,349,349,392,392,349,349];
// ── File nhạc nền bg-music.wav ──
const bgMusic = new Audio('../bg-music.wav');
bgMusic.loop = true;
bgMusic.preload = 'auto';
bgMusic.playsInline = true;
bgMusic.volume = 0.55;

function tone(f,type,dur,vol,delay=0){
  if(!musicOn)return;
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}
function bgTick(){
  const ms=60000/76*0.5;
  tone(MELODY[melIdx%MELODY.length],'triangle',0.35,0.035);
  if(melIdx%4===0)tone(BASS[Math.floor(melIdx/4)%BASS.length],'sine',0.55,0.022);
  melIdx++;bgTimer=setTimeout(bgTick,ms);
}
function startMusic(){
  if(bgMusic.paused){ bgMusic.play().catch(function(){}); }
  if(!bgTimer){melIdx=0;bgTick();}
}
function stopMusic(){
  bgMusic.pause(); bgMusic.currentTime=0;
  if(bgTimer){clearTimeout(bgTimer);bgTimer=null;}
}
function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('music-btn').textContent=musicOn?'🎵':'🔇';
  musicOn?startMusic():stopMusic();
}
document.addEventListener('click',e=>{
  if(e.target.matches('button,.lesson-btn,.cho-btn')){
    if(musicOn&&AC.state==='suspended')AC.resume();
    tone(600,'sine',0.08,0.12);
  }
},true);
const snd={
  correct:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.18,0.18,i*0.07));},
  wrong:()=>{tone(200,'sawtooth',0.25,0.18);tone(160,'sawtooth',0.2,0.14,0.1);},
  next:()=>{tone(440,'sine',0.1,0.1);tone(550,'sine',0.1,0.08,0.06);},
  cheer:()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,'triangle',0.3,0.2,i*0.07));setTimeout(()=>[784,1047,1319].forEach((f,i)=>tone(f,'sine',0.2,0.15,i*0.06)),700);}
};

// ══════ SCREENS ══════
function showScreen(id){
  try{ if(AC.state==='suspended')AC.resume(); if(bgMusic.paused&&musicOn)bgMusic.play().catch(()=>{}); }catch(e){}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function handleBack(){
  const onGame=document.getElementById('screen-game').classList.contains('active');
  const onResult=document.getElementById('screen-result').classList.contains('active');
  if(onGame||onResult)goMenu();
}
function goMenu(){showScreen('screen-menu');}

// ══════ QUESTION BANKS ══════
function shuffle(arr){return arr.slice().sort(()=>Math.random()-0.5);}
function pick8(arr){return shuffle(arr).slice(0,8);}

function genChoices4(answer,pool){
  const ans=String(answer);
  const s=[ans];
  const others=shuffle(pool.map(String).filter(x=>x!==ans));
  for(const x of others){if(s.length>=4)break;s.push(x);}
  // fallback: pad with nearby numbers
  let pad=0;
  while(s.length<4){s.push(String(pad++));}
  return shuffle(s);
}

// BÀI 1: Đếm số lượng — 20 câu
const EMOJI_BANK=[
  {emoji:'🍎',count:3},{emoji:'🐶',count:2},{emoji:'⭐',count:4},
  {emoji:'🐱',count:5},{emoji:'🌸',count:2},{emoji:'🚗',count:3},
  {emoji:'🍌',count:4},{emoji:'🐸',count:1},{emoji:'🎈',count:5},
  {emoji:'🦋',count:2},{emoji:'🍊',count:3},{emoji:'🐥',count:4},
  {emoji:'🌙',count:3},{emoji:'🍕',count:2},{emoji:'🐠',count:3},
  {emoji:'🏠',count:4},{emoji:'🌈',count:1},{emoji:'🎁',count:5},
  {emoji:'🐇',count:2},{emoji:'🍦',count:3},
];

// BÀI 2: Phép cộng — 20 câu
const ADD_BANK=[
  {q:'1 + 1 = ?',a:2},{q:'2 + 1 = ?',a:3},{q:'1 + 2 = ?',a:3},{q:'2 + 2 = ?',a:4},
  {q:'3 + 1 = ?',a:4},{q:'1 + 3 = ?',a:4},{q:'4 + 1 = ?',a:5},{q:'2 + 3 = ?',a:5},
  {q:'3 + 2 = ?',a:5},{q:'1 + 4 = ?',a:5},{q:'0 + 1 = ?',a:1},{q:'0 + 2 = ?',a:2},
  {q:'0 + 3 = ?',a:3},{q:'0 + 4 = ?',a:4},{q:'0 + 5 = ?',a:5},{q:'1 + 0 = ?',a:1},
  {q:'2 + 0 = ?',a:2},{q:'3 + 0 = ?',a:3},{q:'4 + 0 = ?',a:4},{q:'5 + 0 = ?',a:5},
];

// BÀI 3: Phép trừ — 20 câu
const SUB_BANK=[
  {q:'2 − 1 = ?',a:1},{q:'3 − 1 = ?',a:2},{q:'4 − 1 = ?',a:3},{q:'5 − 1 = ?',a:4},
  {q:'3 − 2 = ?',a:1},{q:'4 − 2 = ?',a:2},{q:'5 − 2 = ?',a:3},{q:'4 − 3 = ?',a:1},
  {q:'5 − 3 = ?',a:2},{q:'5 − 4 = ?',a:1},{q:'2 − 0 = ?',a:2},{q:'3 − 0 = ?',a:3},
  {q:'4 − 0 = ?',a:4},{q:'5 − 0 = ?',a:5},{q:'1 − 0 = ?',a:1},{q:'5 − 5 = ?',a:0},
  {q:'4 − 4 = ?',a:0},{q:'3 − 3 = ?',a:0},{q:'2 − 2 = ?',a:0},{q:'1 − 1 = ?',a:0},
];

// BÀI 4: So sánh — 20 câu (đáp án là số)
const CMP_BANK=[
  {q:'3  và  5\nSố nào lớn hơn?',a:'5',pool:['1','2','3','4','5']},
  {q:'2  và  4\nSố nào lớn hơn?',a:'4',pool:['1','2','3','4','5']},
  {q:'1  và  3\nSố nào nhỏ hơn?',a:'1',pool:['1','2','3','4','5']},
  {q:'5  và  2\nSố nào nhỏ hơn?',a:'2',pool:['1','2','3','4','5']},
  {q:'4  và  1\nSố nào lớn hơn?',a:'4',pool:['1','2','3','4','5']},
  {q:'2  và  3\nSố nào nhỏ hơn?',a:'2',pool:['1','2','3','4','5']},
  {q:'1  và  5\nSố nào lớn hơn?',a:'5',pool:['1','2','3','4','5']},
  {q:'4  và  3\nSố nào lớn hơn?',a:'4',pool:['1','2','3','4','5']},
  {q:'3  và  1\nSố nào nhỏ hơn?',a:'1',pool:['1','2','3','4','5']},
  {q:'5  và  4\nSố nào nhỏ hơn?',a:'4',pool:['2','3','4','5','1']},
  {q:'1  và  4\nSố nào nhỏ hơn?',a:'1',pool:['1','2','3','4','5']},
  {q:'3  và  4\nSố nào lớn hơn?',a:'4',pool:['1','2','3','4','5']},
  {q:'5  và  3\nSố nào lớn hơn?',a:'5',pool:['1','3','4','5','2']},
  {q:'2  và  1\nSố nào lớn hơn?',a:'2',pool:['1','2','3','4','5']},
  {q:'4  và  5\nSố nào nhỏ hơn?',a:'4',pool:['2','3','4','5','1']},
  {q:'1  và  2\nSố nào lớn hơn?',a:'2',pool:['1','2','3','4','5']},
  {q:'3  và  5\nSố nào nhỏ hơn?',a:'3',pool:['1','2','3','4','5']},
  {q:'5  và  1\nSố nào lớn hơn?',a:'5',pool:['1','2','3','4','5']},
  {q:'4  và  2\nSố nào nhỏ hơn?',a:'2',pool:['1','2','3','4','5']},
  {q:'2  và  5\nSố nào lớn hơn?',a:'5',pool:['1','2','3','4','5']},
];

// BÀI 5: Số còn thiếu — 20 câu
const MISS_BANK=[
  {q:'1,  2,  ...,  4',a:3},{q:'2,  ...,  4,  5',a:3},{q:'...,  2,  3,  4',a:1},
  {q:'1,  2,  3,  ...',a:4},{q:'2,  3,  ...,  5',a:4},{q:'...,  3,  4,  5',a:2},
  {q:'1,  ...,  3,  4',a:2},{q:'3,  4,  ...,  6',a:5},{q:'...,  2,  3',a:1},
  {q:'1,  ...,  3',a:2},{q:'2,  3,  ...',a:4},{q:'...,  4,  5',a:3},
  {q:'3,  ...,  5',a:4},{q:'1,  2,  3,  4,  ...',a:5},{q:'...,  1,  2,  3',a:0},
  {q:'4,  ...,  6',a:5},{q:'2,  ...,  4',a:3},{q:'...,  3,  4',a:2},
  {q:'1,  2,  ...,  4,  5',a:3},{q:'0,  1,  ...,  3',a:2},
];

// ══════ GAME STATE ══════
let questions=[],qIdx=0,qStars=0,qAnswered=false,currentLesson='',totalStars=0;

function startLesson(mode){
  currentLesson=mode;qIdx=0;qStars=0;qAnswered=false;
  const labels={
    count:'Bài 1 — Đếm số lượng',
    add:'Bài 2 — Phép cộng',
    sub:'Bài 3 — Phép trừ',
    compare:'Bài 4 — So sánh số',
    missing:'Bài 5 — Số còn thiếu'
  };
  document.getElementById('gi-lesson').textContent=labels[mode];

  const numPool=[0,1,2,3,4,5,6];

  if(mode==='count'){
    questions=pick8(EMOJI_BANK).map(b=>({
      type:'count',emoji:b.emoji,count:b.count,answer:b.count,
      choices:genChoices4(b.count,[1,2,3,4,5])
    }));
  } else if(mode==='add'){
    questions=pick8(ADD_BANK).map(b=>({
      type:'calc',q:b.q,answer:b.a,choices:genChoices4(b.a,numPool)
    }));
  } else if(mode==='sub'){
    questions=pick8(SUB_BANK).map(b=>({
      type:'calc',q:b.q,answer:b.a,choices:genChoices4(b.a,numPool)
    }));
  } else if(mode==='compare'){
    questions=pick8(CMP_BANK).map(b=>({
      type:'compare',q:b.q,answer:b.a,choices:genChoices4(b.a,b.pool)
    }));
  } else if(mode==='missing'){
    questions=pick8(MISS_BANK).map(b=>({
      type:'missing',q:b.q,answer:b.a,choices:genChoices4(b.a,numPool)
    }));
  }

  showScreen('screen-game');
  renderQuestion();
}

// ══════ RENDER ══════
function renderQuestion(){
  qAnswered=false;
  const q=questions[qIdx];
  const total=questions.length;
  document.getElementById('gi-prog').textContent=(qIdx+1)+'/'+total;
  document.getElementById('gi-stars').textContent='⭐ '+qStars;
  document.getElementById('prog-fill').style.width=(qIdx/total*100)+'%';
  document.getElementById('q-feedback').textContent='';
  document.getElementById('q-feedback').className='q-feedback';
  document.getElementById('btn-next').classList.remove('on');

  // Animate card
  const card=document.getElementById('qcard');
  card.classList.remove('slide-in');
  void card.offsetWidth;
  card.classList.add('slide-in');

  const disp=document.getElementById('q-display');
  const label=document.getElementById('q-label');

  if(q.type==='count'){
    label.textContent='ĐẾM XEM CÓ MẤY?';
    disp.className='q-display emoji-row';
    disp.innerHTML=Array(q.count).fill(`<span style="display:inline-block;">${q.emoji}</span>`).join('');
  } else if(q.type==='calc'){
    label.textContent='TÍNH KẾT QUẢ';
    disp.className='q-display';
    disp.textContent=q.q;
  } else if(q.type==='compare'){
    // Extract speech text from question
    const lines=q.q.split('\n');
    const nums=lines[0].trim(); // e.g. "3  và  5"
    const instruction=lines[1]||''; // e.g. "Số nào lớn hơn?"
    const speechText=nums+'. '+instruction;
    label.innerHTML=`SO SÁNH SỐ &nbsp;
      <button onclick="speak('${speechText.replace(/'/g,"\\'")}')"
        style="border:none;background:rgba(179,136,255,0.2);border-radius:50%;width:36px;height:36px;
        font-size:18px;cursor:pointer;vertical-align:middle;line-height:1;">🔊</button>`;
    disp.className='q-display';
    disp.style.fontSize='clamp(20px,5vw,26px)';
    disp.innerHTML=q.q.replace(/\n/g,'<br>');
    // Auto-speak after short delay
    setTimeout(()=>speak(speechText),350);
  } else if(q.type==='missing'){
    label.textContent='SỐ NÀO CÒN THIẾU?';
    disp.className='q-display';
    disp.style.fontSize='clamp(22px,5.5vw,30px)';
    disp.textContent=q.q;
  }
  if(q.type!=='compare'&&q.type!=='missing') disp.style.fontSize='';

  // 4 choices in 2×2 grid
  const cg=document.getElementById('choices-grid');
  cg.innerHTML=q.choices.map(c=>
    `<button class="cho-btn" onclick="pick(this,'${c}','${q.answer}')">${c}</button>`
  ).join('');
}

function pick(btn,val,answer){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll('#choices-grid .cho-btn').forEach(b=>b.disabled=true);
  const correct=String(val)===String(answer);
  const fb=document.getElementById('q-feedback');
  if(correct){
    btn.classList.add('correct');
    fb.textContent='🌟 Đúng rồi! Giỏi quá!';
    fb.className='q-feedback ok';
    qStars++;totalStars++;
    document.getElementById('gi-stars').textContent='⭐ '+qStars;
    document.getElementById('hdr-stars').textContent='⭐ '+totalStars;
    snd.correct();
  } else {
    btn.classList.add('wrong');
    fb.textContent='💙 Chưa đúng, thử câu khác nhé!';
    fb.className='q-feedback no';
    document.querySelectorAll('#choices-grid .cho-btn').forEach(b=>{
      if(String(b.textContent.trim())===String(answer))b.classList.add('correct');
    });
    snd.wrong();
  }
  document.getElementById('btn-next').classList.add('on');
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=questions.length)showResult();
  else{snd.next();renderQuestion();}
}

function showResult(){
  const total=questions.length;
  let emoji='💪',title='Cố gắng lên!',msg='Lần sau bé sẽ làm tốt hơn nhé! 🌈';
  if(qStars===total){emoji='🏆';title='Xuất sắc! 🌟';msg='Bé giỏi quá! Đúng hết rồi! Tuyệt vời!';snd.cheer();}
  else if(qStars>=total*0.75){emoji='🎉';title='Rất giỏi! 👏';msg='Bé học tốt lắm! Gần hoàn hảo rồi!';snd.correct();}
  else if(qStars>=total*0.5){emoji='😊';title='Giỏi lắm! 👍';msg='Bé làm được nhiều câu rồi! Tiếp tục nhé!';snd.correct();}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-score').textContent=qStars+' / '+total+' ⭐';
  showScreen('screen-result');
  if(qStars===total)launchConfetti();
}

function replayLesson(){startLesson(currentLesson);}

// CONFETTI
const CONF=['#f44336','#2196f3','#ffeb3b','#4caf50','#9c27b0','#ff9800','#e91e63'];
function launchConfetti(){
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;background:${CONF[~~(Math.random()*CONF.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2500);
    },i*30);
  }
}

// ══════ SPEECH ══════
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='vi-VN';u.rate=0.82;u.pitch=1.15;
  window.speechSynthesis.speak(u);
}


// ── Mở khóa audio trên mobile (iOS/Android bắt buộc cần user gesture) ──
function initAudioUnlock(){
  var overlay = document.getElementById('audio-unlock');
  var btn = document.getElementById('audio-unlock-btn');
  if(!overlay||!btn) return;
  var isMobile = /iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent)
               || ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(!isMobile){ bgMusic.play().catch(function(){}); return; }
  overlay.style.display = 'flex';
  function unlock(){
    overlay.style.display = 'none';
    if(typeof AC !== 'undefined' && AC.state === 'suspended') AC.resume();
    bgMusic.play().catch(function(){});
  }
  btn.addEventListener('click', unlock, {once:true});
  overlay.addEventListener('click', unlock, {once:true});
}

// ── Tự resume nhạc khi quay lại app ──
// Resume nhac khi quay lai app
document.addEventListener('visibilitychange', function(){
  if(document.hidden) return;
  if(typeof AC !== 'undefined' && AC.state === 'suspended') AC.resume();
  if(typeof musicOn !== 'undefined' && musicOn && bgMusic.paused)
    bgMusic.play().catch(function(){});
});


initAudioUnlock();
</script>
